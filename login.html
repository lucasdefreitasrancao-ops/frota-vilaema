<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Vila Ema Controle de Frota</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#071A35;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
/* Padrão geométrico de fundo */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    repeating-linear-gradient(60deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(120deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 0,transparent 50%);
  background-size:40px 40px;
  pointer-events:none;
}
.login-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:40px 36px;
  width:100%;
  max-width:400px;
  backdrop-filter:blur(12px);
  box-shadow:0 32px 80px rgba(0,0,0,.5);
  position:relative;
  z-index:1;
  animation:slideUp .4s cubic-bezier(.34,1.4,.64,1);
}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-icon{
  width:64px;height:64px;margin:0 auto 14px;
  background:linear-gradient(135deg,#1e40af,#2563eb);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(37,99,235,.4);
}
.logo-bars{display:flex;gap:5px;align-items:flex-end;height:32px}
.bar{background:#fff;border-radius:3px}
.b1{width:8px;height:18px;transform:skewX(-8deg)}
.b2{width:8px;height:24px;transform:skewX(-8deg)}
.b3{width:8px;height:14px;transform:skewX(-8deg)}
.logo-title{color:#fff;font-size:1.5rem;font-weight:800;letter-spacing:.02em}
.logo-sub{color:#60a5fa;font-size:.78rem;font-weight:500;margin-top:3px;letter-spacing:.08em;text-transform:uppercase}

/* Formulário */
.form-group{margin-bottom:18px}
label{display:block;font-size:.72rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.input-wrap{position:relative}
input[type=text],input[type=password],input[type=email]{
  width:100%;
  background:rgba(255,255,255,.07);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:10px;
  padding:12px 14px 12px 42px;
  color:#fff;
  font-size:.92rem;
  outline:none;
  transition:all .18s;
}
input::placeholder{color:rgba(255,255,255,.3)}
input:focus{border-color:#2563eb;background:rgba(37,99,235,.12);box-shadow:0 0 0 3px rgba(37,99,235,.2)}
.input-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.35);pointer-events:none;
}
.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;
  padding:4px;border-radius:4px;transition:color .15s;
}
.eye-btn:hover{color:rgba(255,255,255,.7)}

.btn-login{
  width:100%;
  background:linear-gradient(135deg,#1e40af,#2563eb);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:13px;
  font-size:.95rem;
  font-weight:700;
  cursor:pointer;
  transition:all .18s;
  margin-top:6px;
  letter-spacing:.02em;
  box-shadow:0 4px 15px rgba(37,99,235,.35);
}
.btn-login:hover:not(:disabled){background:linear-gradient(135deg,#1d4ed8,#1e40af);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.45)}
.btn-login:active:not(:disabled){transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.btn-login .spin{animation:rot .7s linear infinite;display:inline-block}
@keyframes rot{to{transform:rotate(360deg)}}

.error-msg{
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.35);
  border-radius:8px;
  padding:10px 14px;
  color:#fca5a5;
  font-size:.82rem;
  font-weight:600;
  margin-top:14px;
  display:none;
  align-items:center;
  gap:8px;
}
.error-msg.show{display:flex}

.divider{
  display:flex;align-items:center;gap:10px;
  margin:20px 0;color:rgba(255,255,255,.15);font-size:.75rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

.footer-txt{text-align:center;font-size:.72rem;color:rgba(255,255,255,.2);margin-top:24px}
.shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>
<body>
<div class="login-box" id="box">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">
      <div class="logo-bars">
        <div class="bar b1"></div>
        <div class="bar b2"></div>
        <div class="bar b3"></div>
      </div>
    </div>
    <div class="logo-title">VILA EMA</div>
    <div class="logo-sub">Controle de Frota</div>
  </div>

  <!-- Formulário -->
  <form id="login-form" onsubmit="return false">
    <div class="form-group">
      <label>E-mail</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16v16H4z"/><path d="M4 8l8 5 8-5"/>
          </svg>
        </span>
        <input type="email" id="username" placeholder="seu@email.com" autocomplete="username" autofocus/>
      </div>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="Digite sua senha" autocomplete="current-password"/>
        <button type="button" class="eye-btn" id="toggle-pw" title="Mostrar/ocultar senha">
          <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <button type="submit" class="btn-login" id="login-btn" onclick="doLogin()">
      Entrar
    </button>

    <div class="error-msg" id="error-msg">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-text">Usuário ou senha incorretos.</span>
    </div>
  </form>

  <div class="footer-txt">Vila Ema Transportes · v3.8 Firebase</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="./js/firebase-config.js"></script>
<script src="./js/firebase-storage.js"></script>
<script>
const REDIRECT = 'index.html';

if (!firebase.apps.length) firebase.initializeApp(window.firebaseConfig);
const auth = firebase.auth();

// Toggle visibilidade senha
document.getElementById('toggle-pw').addEventListener('click', function() {
  const inp = document.getElementById('password');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  document.getElementById('eye-icon').innerHTML = isHidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

// Submit por Enter
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

function doLogin() {
  const email = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const btn  = document.getElementById('login-btn');
  const err  = document.getElementById('error-msg');

  if (!email || !pass) {
    showError('Preencha e-mail e senha.');
    return;
  }
  if (btn.disabled) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⚙️</span> Entrando…';
  err.classList.remove('show');

  var loginTimeout = setTimeout(function () {
    btn.disabled = false;
    btn.innerHTML = 'Entrar';
    showError('Tempo esgotado. Verifique sua internet ou tente novamente.');
  }, 20000);

  function finishLogin() { clearTimeout(loginTimeout); }

  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .then(function () { return auth.signInWithEmailAndPassword(email, pass); })
    .then(function (cred) {
      finishLogin();
      var label = (cred.user.email || '').split('@')[0];
      btn.innerHTML = '✅ Bem-vindo, ' + label + '!';
      btn.style.background = 'linear-gradient(135deg,#15803d,#16a34a)';
      setTimeout(function () { window.location.replace(REDIRECT); }, 500);
    })
    .catch(function (e) {
      finishLogin();
      btn.disabled = false;
      btn.innerHTML = 'Entrar';
      var msg = 'E-mail ou senha incorretos.';
      if (e.code === 'auth/invalid-email') msg = 'E-mail inválido.';
      if (e.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Aguarde um momento.';
      if (e.code === 'auth/network-request-failed') msg = 'Sem conexão com o Firebase. Verifique a internet.';
      if (e.code === 'auth/operation-not-allowed') msg = 'Login por e-mail desativado no Firebase Console.';
      if (e.code === 'auth/user-disabled') msg = 'Usuário desativado. Contate o administrador.';
      if (e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found') {
        msg = 'E-mail ou senha incorretos.';
      }
      showError(msg);
      document.getElementById('box').classList.add('shake');
      setTimeout(function () { document.getElementById('box').classList.remove('shake'); }, 400);
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
      console.error('[Login]', e.code, e.message);
    });
}

// Se já estiver logado, redireciona
auth.onAuthStateChanged(function (user) {
  if (user) {
    document.getElementById('login-btn').disabled = true;
    document.getElementById('login-btn').innerHTML = '<span class="spin">⚙️</span> Redirecionando…';
    window.location.replace(REDIRECT);
  }
});

function showError(msg) {
  const err = document.getElementById('error-msg');
  document.getElementById('error-text').textContent = msg;
  err.classList.add('show');
}
</script>
</body>
</html>
