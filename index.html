// Itens do Google Forms (importação planilha)
const CHECKLIST_ITEMS_FORMS = [
  {key:'existem_avarias',  label:'Avarias',              icon:'💥'},
  {key:'existem_lampadas', label:'Lâmpadas queimadas',   icon:'💡'},
  {key:'existem_falhas',   label:'Falhas',               icon:'⚙️'},
  {key:'limpeza_externa',  label:'Limpeza Externa',      icon:'🚿'},
  {key:'limpeza_interna',  label:'Limpeza Interna',      icon:'🧹'},
];

// Itens do formulário interno (checklist.html / QR Code)
const CHECKLIST_ITEMS_APP = [
  {key:'freios',     label:'Sistema de Freios',   icon:'🛑'},
  {key:'pneus',      label:'Pneus e Estepe',      icon:'⚫'},
  {key:'luzes',      label:'Luzes e Sinalização', icon:'💡'},
  {key:'oleo',       label:'Nível de Óleo',       icon:'🔧'},
  {key:'agua',       label:'Nível de Água',       icon:'💧'},
  {key:'documentos', label:'Documentos',        icon:'📄'},
  {key:'espelhos',   label:'Espelhos e Vidros',   icon:'🪞'},
  {key:'vazamentos', label:'Vazamentos',          icon:'🔴'},
  {key:'motor',      label:'Motor e Painel',      icon:'⚙️'},
  {key:'carroceria', label:'Carroceria e Baú',    icon:'🚛'},
];

const CHECKLIST_APP_KEYS = CHECKLIST_ITEMS_APP.map(i => i.key);

function isChecklistApp(c) {
  return CHECKLIST_APP_KEYS.some(k => c[k] && String(c[k]).trim() && c[k] !== 'nao_avaliado');
}

function getChecklistItems(c) {
  return isChecklistApp(c) ? CHECKLIST_ITEMS_APP : CHECKLIST_ITEMS_FORMS;
}

function formatChecklistResp(v) {
  const lv = String(v || '').toLowerCase();
  if (!v || lv === 'nao_avaliado') return { label:'—', bg:'#f1f5f9', color:'#64748b' };
  if (lv === 'ok') return { label:'✅ OK', bg:'#dcfce7', color:'#16a34a' };
  if (lv === 'atencao') return { label:'⚠️ Atenção', bg:'#fef3c7', color:'#b45309' };
  if (lv === 'critico') return { label:'🔴 Crítico', bg:'#fee2e2', color:'#dc2626' };
  const n = normFormsVal(v);
  if (n.startsWith('SIM') || n.includes('SUJO') || n.includes('DEFEITO')) return { label: String(v), bg:'#fee2e2', color:'#dc2626' };
  if (n.startsWith('NAO') || n === 'LIMPO') return { label: String(v), bg:'#dcfce7', color:'#16a34a' };
  return { label: String(v), bg:'#f1f5f9', color:'#475569' };
}

function checklistItemIcon(v) {
  const f = formatChecklistResp(v);
  if (f.color === '#dc2626') return '🔴';
  if (f.color === '#b45309') return '🟡';
  if (f.color === '#16a34a') return '🟢';
  return '⚪';
}

function checklistResumoColuna(c) {
  const items = getChecklistItems(c);
  const crit = items.find(it => formatChecklistResp(c[it.key]).color === '#dc2626');
  if (crit) return formatChecklistResp(c[crit.key]).label;
  const atn = items.find(it => formatChecklistResp(c[it.key]).color === '#b45309');
  if (atn) return formatChecklistResp(c[atn.key]).label;
  return 'OK';
}

function PageTacografo({caminhoes,onOk}){
  const[editing,setEditing]=useState(null);
  const[dataEdit,setDataEdit]=useState('');
  const[busy,setBusy]=useState(false);

  const rows=useMemo(()=>caminhoes.map(c=>Object.assign({c:c},calcTacografoInfo(c))),[caminhoes]);

  const counts=useMemo(()=>({
    vencida:rows.filter(r=>r.status==='vencida').length,
    alerta: rows.filter(r=>r.status==='alerta').length,
    atencao:rows.filter(r=>r.status==='atencao').length,
    ok:     rows.filter(r=>r.status==='ok').length,
    sem:    rows.filter(r=>r.semDados).length
  }),[rows]);

  const statusStyle={
    vencida:   {bg:'#fef2f2',border:'#fecaca',txt:'#dc2626',label:'Vencida'},
    alerta:    {bg:'#f5f3ff',border:'#ddd6fe',txt:'#7c3aed',label:'Renovar em breve'},
    atencao:   {bg:'#fffbeb',border:'#fde68a',txt:'#92400e',label:'Atenção'},
    ok:        {bg:'#f0fdf4',border:'#bbf7d0',txt:'#15803d',label:'Em dia'},
    'sem-dados':{bg:'#f8fafc',border:'#e2e8f0',txt:'#64748b',label:'Sem registro'}
  };

  const startEdit=c=>{
    setEditing(c.id);
    setDataEdit(str(c.data_calibracao_tacografo));
  };

  const saveEdit=async c=>{
    if(!dataEdit){toast('Informe a data da calibração','err');return;}
    setBusy(true);
    try{
      const payload=Object.assign({},c,{data_calibracao_tacografo:dataEdit});
      delete payload.id;
      await api.put('caminhoes',c.id,payload);
      toast('Calibração registrada!');
      setEditing(null);
      onOk();
    }catch(e){toast(e.message,'err');}
    finally{setBusy(false);}
  };

  const delCalibracao=c=>{
    askConfirm('Excluir calibração','Remover a data de calibração do tacógrafo de '+c.placa+'?',async()=>{
      setBusy(true);
      try{
        const payload=Object.assign({},c,{data_calibracao_tacografo:''});
        delete payload.id;
        await api.put('caminhoes',c.id,payload);
        toast('Calibração excluída');
        setEditing(null);
        onOk();
      }catch(e){toast(e.message,'err');}
      finally{setBusy(false);}
    },'Excluir');
  };

  return h('div',{class:'p-5 space-y-4'},
    h('div',{class:'grid grid-cols-2 lg:grid-cols-5 gap-3'},
      h(KPI,{label:'Vencidas',value:counts.vencida,color:'red',icon:'bell'}),
      h(KPI,{label:'≤ '+TACOGRAFO_ALERTA_DIAS+' dias',value:counts.alerta,color:'purple',icon:'bell'}),
      h(KPI,{label:'Atenção',value:counts.atencao,color:'orange',icon:'bell'}),
      h(KPI,{label:'Em dia',value:counts.ok,color:'green',icon:'ok'}),
      h(KPI,{label:'Sem registro',value:counts.sem,color:'blue',icon:'truck'})
    ),
    h('div',{class:'card'},
      h('p',{class:'text-sm text-slate-500 mb-4'},
        'Cadastre a data da última calibração do tacógrafo por veículo. Validade: ',
        h('strong',null,N(TACOGRAFO_VALIDADE_DIAS),' dias (2 anos)'),
        '. O dashboard principal alerta quando faltarem ',
        h('strong',null,TACOGRAFO_ALERTA_DIAS,' dias'),
        ' ou menos para o vencimento.'
      ),
      rows.length>0
        ?h('div',{class:'tbl-wrap'},
            h('table',null,
              h('thead',null,h('tr',null,['Placa','Motorista','Data Calibração','Dias desde','Dias restantes','Próx. vencimento','Status',''].map(l=>h('th',{key:l},l)))),
              h('tbody',null,rows.map(r=>{
                const st=statusStyle[r.status]||statusStyle['sem-dados'];
                const isEdit=editing===r.c.id;
                return h('tr',{key:r.c.id},
                  h('td',null,h('span',{class:'font-mono font-bold text-xs px-2 py-0.5 rounded',style:'background:#eff6ff;color:#071A35'},r.c.placa||'—')),
                  h('td',null,r.c.motorista||'—'),
                  h('td',null,
                    isEdit
                      ?h('input',{type:'date',class:'inp',style:'max-width:160px',value:dataEdit,onInput:e=>setDataEdit(e.target.value)})
                      :r.data?D(r.data):h('span',{class:'text-slate-400'},'—')
                  ),
                  h('td',null,r.semDados?'—':N(r.diasDesde)+' dias'),
                  h('td',null,
                    r.semDados?'—':h('span',{class:'font-bold',style:'color:'+(r.diasRestantes<=TACOGRAFO_ALERTA_DIAS?'#7c3aed':'#334155')},
                      r.diasRestantes<0?Math.abs(r.diasRestantes)+' dias atraso':r.diasRestantes+' dias'
                    )
                  ),
                  h('td',null,r.vencimento?D(r.vencimento):'—'),
                  h('td',null,h('span',{class:'badge font-bold',style:'background:'+st.bg+';color:'+st.txt+';border:1px solid '+st.border},st.label)),
                  h('td',null,
                    isEdit
                      ?h('div',{class:'flex gap-1 flex-wrap'},
                          h('button',{class:'btn btn-sm btn-primary',disabled:busy,onClick:()=>saveEdit(r.c)},busy?'…':'Salvar'),
                          h('button',{class:'btn btn-sm btn-ghost',onClick:()=>setEditing(null)},'Cancelar')
                        )
                      :h('div',{class:'flex gap-1'},
                          h('button',{class:'btn btn-sm btn-outline',onClick:()=>startEdit(r.c),title:'Editar calibração'},h(Ic,{n:'edit',s:13})),
                          r.data?h('button',{class:'btn btn-sm btn-danger',disabled:busy,onClick:()=>delCalibracao(r.c),title:'Excluir calibração'},h(Ic,{n:'trash',s:13})):null
                        )
                  )
                );
              }))
            )
          )
        :h(Empty,{msg:'Nenhum veículo cadastrado',icon:'truck'})
    )
  );
}

// PAGE — ALERTAS
// ═══════════════════════════════════════
function PageAlertas({alertas,caminhoes,manutencoes}){
  const crits=alertas.filter(a=>a.lvl==='critical');
  const warns=alertas.filter(a=>a.lvl==='warn');
  const alertasOleo=useMemo(()=>gerarAlertasOleo(caminhoes,manutencoes,[]),[caminhoes,manutencoes]);

  const Sec=({title,color,bg,border,dot,items,emoji})=>h('div',{class:'card'},
    h('div',{class:'flex items-center gap-2 mb-4'},
      h('div',{class:'w-3 h-3 rounded-full',style:'background:'+dot}),
      h('h3',{class:'font-bold text-sm',style:'color:'+color},title),
      h('span',{class:'badge ml-1',style:'background:'+bg+';color:'+color},items.length)
    ),
    items.length===0
      ?h('p',{class:'text-sm text-slate-400'},'Nenhum alerta.')
      :h('div',{class:'space-y-2'},
          items.map((a,i)=>h('div',{key:i,class:'flex gap-3 p-3 rounded-xl',style:'background:'+bg+';border:1px solid '+border},
            h('span',null,emoji),
            h('div',null,
              h('div',{class:'text-sm font-semibold',style:'color:'+color},a.msg),
              h('div',{class:'text-xs mt-0.5 text-slate-500'},a.cat+' · '+a.pl)
            )
          ))
        )
  );

  return h('div',{class:'p-5 space-y-4'},
    h('div',{class:'grid grid-cols-3 gap-4 mb-2'},
      h(KPI,{label:'Críticos',value:crits.length,color:'red',icon:'bell'}),
      h(KPI,{label:'Atenção',value:warns.length,color:'orange',icon:'bell'}),
      h(KPI,{label:'Total',value:alertas.length,color:'blue',icon:'chart'})
    ),
    alertasOleo.length>0?h('div',{class:'card',style:'border:2px solid #fde68a;background:#fffbeb'},
      h('div',{class:'flex items-center justify-between flex-wrap gap-3'},
        h('div',null,
          h('h3',{class:'font-bold text-sm',style:'color:#92400e'},'🛢️ Alertas de Troca de Óleo'),
          h('p',{class:'text-xs',style:'color:#b45309'},alertasOleo.length+' veículo(s) — enviar via WhatsApp')
        ),
        h('button',{
          class:'btn btn-sm',
          style:'background:#25d366;color:#fff;font-weight:800',
          onClick:()=>enviarAlertaWhatsApp(alertasOleo)
        },'📲 Alertar WhatsApp')
      )
    ):null,
    h(Sec,{title:'Alertas Críticos',color:'#dc2626',bg:'#fef2f2',border:'#fecaca',dot:'#ef4444',items:crits,emoji:'🔴'}),
    h(Sec,{title:'Alertas de Atenção',color:'#b45309',bg:'#fffbeb',border:'#fde68a',dot:'#f59e0b',items:warns,emoji:'🟡'}),
    alertas.length===0 ? h('div',{class:'card text-center py-12'},
      h('div',{class:'text-4xl mb-3'},'✅'),
      h('p',{class:'font-bold text-green-700'},'Tudo em dia!'),
      h('p',{class:'text-sm text-slate-400 mt-1'},'Nenhum alerta no momento.')
    ) : null
  );
}

// ═══════════════════════════════════════
// PAGE - RELATORIOS
// ═══════════════════════════════════════
function PageRelat({caminhoes,manutencoes,pneus,checklists}){
  var nowR=new Date();
  var mesAtual=nowR.getFullYear()+'-'+String(nowR.getMonth()+1).padStart(2,'0');
  const[filtroMes,setFiltroMes]=useState(mesAtual);
  const[filtroPlaca,setFiltroPlaca]=useState('');
  const[sortCol,setSortCol]=useState('data_servico');
  const[sortAsc,setSortAsc]=useState(false);

  // ── Meses disponíveis (do histórico + últimos 12) ──
  const mesesDisponiveis=useMemo(()=>{
    var set=new Set();
    manutencoes.forEach(function(m){
      if(m.data_servico){
        try{
          var d=new Date(m.data_servico+'T12:00:00');
          set.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
        }catch(e){}
      }
    });
    for(var i=0;i<12;i++){
      var d2=new Date(nowR.getFullYear(),nowR.getMonth()-i,1);
      set.add(d2.getFullYear()+'-'+String(d2.getMonth()+1).padStart(2,'0'));
    }
    return Array.from(set).sort(function(a,b){return b.localeCompare(a);});
  },[manutencoes]);

  // Placas unicas
  const placasUnicas=useMemo(()=>{
    const s=new Set(manutencoes.map(m=>m.placa).filter(Boolean));
    return Array.from(s).sort();
  },[manutencoes]);

  // Filtragem
  const manutFiltradas=useMemo(()=>{
    return manutencoes.filter(function(m){
      if(filtroPlaca&&m.placa!==filtroPlaca)return false;
      if(filtroMes==='todos')return true;
      if(!m.data_servico)return false;
      try{
        var d=new Date(m.data_servico+'T12:00:00');
        var mesM=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        return mesM===filtroMes;
      }catch(e){return false;}
    });
  },[manutencoes,filtroMes,filtroPlaca]);

  // Ordenacao
  const manutOrdenadas=useMemo(()=>{
    return manutFiltradas.slice().sort(function(a,b){
      var va=a[sortCol]||''; var vb=b[sortCol]||'';
      if(sortCol==='valor'||sortCol==='km'){va=num(va);vb=num(vb);}
      if(va<vb)return sortAsc?-1:1;
      if(va>vb)return sortAsc?1:-1;
      return 0;
    });
  },[manutFiltradas,sortCol,sortAsc]);

  // KPIs periodo
  const totalPeriodo=manutFiltradas.reduce((s,m)=>s+custoManutencao(m),0);
  const placasPeriodo=new Set(manutFiltradas.map(m=>m.placa).filter(Boolean)).size;
  const totalGeral=manutencoes.reduce((s,m)=>s+custoManutencao(m),0);

  // Grafico mensal (ultimos 6)
  const monthData=useMemo(()=>{
    return Array.from({length:6},function(_,i){
      var d=new Date(nowR.getFullYear(),nowR.getMonth()-5+i,1);
      var mesK=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      var lbl=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      var val=manutencoes.filter(function(m){
        if(!m.data_servico)return false;
        try{
          var md=new Date(m.data_servico+'T12:00:00');
          var mesM=md.getFullYear()+'-'+String(md.getMonth()+1).padStart(2,'0');
          return mesM===mesK;
        }catch(e){return false;}
      }).reduce(function(s,m){return s+custoManutencao(m);},0);
      return{lbl:lbl,val:val};
    });
  },[manutencoes]);

  // Graficos por veiculo e tipo
  const porCam=useMemo(()=>{
    var map={};
    manutFiltradas.forEach(function(m){if(m.placa)map[m.placa]=(map[m.placa]||0)+custoManutencao(m);});
    return Object.keys(map).map(function(pl){return{pl:pl,v:map[pl]};}).sort(function(a,b){return b.v-a.v;}).slice(0,10);
  },[manutFiltradas]);

  const porTipo=useMemo(()=>{
    var map={};
    manutFiltradas.forEach(function(m){if(m.tipo_servico)map[m.tipo_servico]=(map[m.tipo_servico]||0)+1;});
    return Object.keys(map).map(function(n){return{n:n,v:map[n]};}).sort(function(a,b){return b.v-a.v;}).slice(0,8);
  },[manutFiltradas]);

  // Label mes selecionado
  const labelMes=useMemo(()=>{
    if(filtroMes==='todos')return 'Todos os periodos';
    try{
      var parts=filtroMes.split('-');
      var d=new Date(+parts[0],+parts[1]-1,1);
      return d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    }catch(e){return filtroMes;}
  },[filtroMes]);

  // Exportar dashboard visual (PDF/impressão)
  const exportDashboard=function(){
    exportDashboardHTML({
      title:'Dashboard de Manutenções',
      subtitle:labelMes+(filtroPlaca?' · Placa '+filtroPlaca:''),
      accent:'#2563eb',
      kpis:[
        {label:'Total de Manutenções',value:manutFiltradas.length,color:'#2563eb',sub:labelMes},
        {label:'Custo do Período',value:R(totalPeriodo),color:'#8b5cf6'},
        {label:'Veículos Atendidos',value:placasPeriodo,color:'#f59e0b'},
        {label:'Custo Médio',value:manutFiltradas.length?R(totalPeriodo/manutFiltradas.length):R(0),color:'#16a34a'}
      ],
      headers:['Placa','Tipo','Descrição','Oficina','KM','Valor','Status','Data'],
      rows:manutOrdenadas.map(function(m){
        return [
          str(m.placa)||'—', str(m.tipo_servico)||'—', str(m.descricao)||'—', str(m.oficina)||'—',
          num(m.km)>0?N(m.km)+' km':'—', custoManutencao(m)>0?R(custoManutencao(m)):'—',
          str(m.status)||'—', D(m.data_servico)
        ];
      })
    });
  };

  // Exportar CSV filtrado
  const exportCSV=function(){
    var header=['Placa','Tipo de Servico','Descricao','Oficina','KM','Valor (R$)','Status','Data'];
    var lines=[header.map(function(c){return'"'+c+'"';}).join(',')];
    manutOrdenadas.forEach(function(m){
      var row=[m.placa||'',m.tipo_servico||'',m.descricao||'',m.oficina||'',m.km||'',custoManutencao(m).toFixed(2),m.status||'',m.data_servico||''];
      lines.push(row.map(function(c){return'"'+str(c).replace(/"/g,'""')+'"';}).join(','));
    });
    var bom='\uFEFF';
    var csv=bom+lines.join('\n');
    var a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    a.download='manutencoes_'+filtroMes+'_'+hoje()+'.csv';
    a.click();
    toast('CSV exportado — '+manutOrdenadas.length+' registros');
  };

  // Helper: renderiza th ordenavel
  function renderTh(col,label){
    var seta=sortCol===col?(sortAsc?'^':'v'):'-';
    var cor=sortCol===col?'#2563eb':'#cbd5e1';
    var thSt='color:#475569;background:#f8fafc;border-bottom:2px solid #e2e8f0;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap';
    return h('th',{
      key:col,style:thSt,
      onClick:function(){if(sortCol===col)setSortAsc(function(p){return !p;});else{setSortCol(col);setSortAsc(true);}}
    },label+' ['+seta+']');
  }

  // Helper: badge status
  function renderStatus(s){
    var map={'concluido':'#dcfce7|#16a34a','pendente':'#fef9c3|#ca8a04','em andamento':'#dbeafe|#2563eb','cancelado':'#fee2e2|#dc2626'};
    var k=str(s).toLowerCase();
    var found=map[k]||map[k.replace(/\u00ed/g,'i').replace(/\u00f3/g,'o')]||'#f1f5f9|#64748b';
    var p=found.split('|');
    return h('span',{style:'background:'+p[0]+';color:'+p[1]+';padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:700'},str(s)||'-');
  }

  // Helper: label mes
  function mesLabel(mes){
    if(!mes||mes==='todos')return 'Todos os periodos';
    try{
      var parts=mes.split('-');
      var d=new Date(+parts[0],+parts[1]-1,1);
      return d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    }catch(e){return mes;}
  }

  // Helper: qtd manutencoes no mes
  function qtdNoMes(mes){
    var parts=mes.split('-');
    var y=+parts[0]; var mo=+parts[1]-1;
    return manutencoes.filter(function(mn){
      if(!mn.data_servico)return false;
      try{
        var md=new Date(mn.data_servico+'T12:00:00');
        return md.getFullYear()===y&&md.getMonth()===mo;
      }catch(e){return false;}
    }).length;
  }

  // RENDER
  return h('div',{class:'p-5 space-y-5'},

    // Cabeçalho
    h('div',{class:'flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3'},
      h('div',null,
        h('h2',{class:'text-xl font-extrabold',style:'color:#071A35'},'Relatórios'),
        h('p',{class:'text-sm text-slate-400 mt-0.5'},'Análise e exportação de manutenções')
      ),
      h('div',{class:'flex gap-2 flex-wrap'},
        h('button',{
          class:'btn btn-outline',
          onClick:exportDashboard
        },h(Ic,{n:'chart',s:15}),'Exportar Dashboard'),
        h('button',{
          class:'btn',
          style:'background:#071A35;color:#fff;display:flex;align-items:center;gap:6px;',
          onClick:exportCSV
        },h(Ic,{n:'dl',s:15}),'Exportar CSV')
      )
    ),

    // Hero — total de manutenções em destaque
    h('div',{class:'rounded-2xl p-6 lg:p-8',style:'background:linear-gradient(135deg,#071A35 0%,#1e40af 100%);color:#fff;box-shadow:0 8px 32px rgba(7,26,53,.25)'},
      h('div',{class:'flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6'},
        h('div',null,
          h('p',{class:'text-sm font-semibold',style:'opacity:.75;text-transform:uppercase;letter-spacing:.08em'},'Manutenções Realizadas'),
          h('div',{class:'text-5xl lg:text-6xl font-black mt-2'},N(manutFiltradas.length)),
          h('p',{class:'text-base mt-2',style:'opacity:.85'},labelMes+(filtroPlaca?' · '+filtroPlaca:''))
        ),
        h('div',{class:'grid grid-cols-2 gap-4 lg:gap-6'},
          h('div',{class:'rounded-xl p-4',style:'background:rgba(255,255,255,.12);backdrop-filter:blur(4px)'},
            h('div',{class:'text-xs font-bold uppercase',style:'opacity:.7'},'Custo Período'),
            h('div',{class:'text-2xl font-extrabold mt-1'},R(totalPeriodo))
          ),
          h('div',{class:'rounded-xl p-4',style:'background:rgba(255,255,255,.12);backdrop-filter:blur(4px)'},
            h('div',{class:'text-xs font-bold uppercase',style:'opacity:.7'},'Veículos'),
            h('div',{class:'text-2xl font-extrabold mt-1'},N(placasPeriodo))
          ),
          h('div',{class:'rounded-xl p-4',style:'background:rgba(255,255,255,.12);backdrop-filter:blur(4px)'},
            h('div',{class:'text-xs font-bold uppercase',style:'opacity:.7'},'Custo Médio'),
            h('div',{class:'text-2xl font-extrabold mt-1'},manutFiltradas.length?R(totalPeriodo/manutFiltradas.length):R(0))
          ),
          h('div',{class:'rounded-xl p-4',style:'background:rgba(255,255,255,.12);backdrop-filter:blur(4px)'},
            h('div',{class:'text-xs font-bold uppercase',style:'opacity:.7'},'Total Geral'),
            h('div',{class:'text-2xl font-extrabold mt-1'},R(totalGeral))
          )
        )
      )
    ),

    // Painel de Filtros
    h('div',{class:'card',style:'padding:16px 20px'},
      h('div',{class:'flex flex-wrap items-end gap-4'},
        h('div',{style:'display:flex;flex-direction:column;gap:6px'},
          h('label',{style:'font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em'},'Período'),
          h('select',{
            style:'border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:500;background:#fff;color:#071A35;min-width:190px',
            value:filtroMes,
            onChange:function(e){setFiltroMes(e.target.value);}
          },
            h('option',{value:'todos'},'Todos os periodos'),
            mesesDisponiveis.map(function(mes){
              var qtd=qtdNoMes(mes);
              var lbl=mesLabel(mes);
              return h('option',{key:mes,value:mes},lbl+(qtd>0?' ('+qtd+')':''));
            })
          )
        ),
        h('div',{style:'display:flex;flex-direction:column;gap:6px'},
          h('label',{style:'font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em'},'Placa'),
          h('select',{
            style:'border:1px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:500;background:#fff;color:#071A35;min-width:150px',
            value:filtroPlaca,
            onChange:function(e){setFiltroPlaca(e.target.value);}
          },
            h('option',{value:''},'Todas as placas'),
            placasUnicas.map(function(p){return h('option',{key:p,value:p},p);})
          )
        ),
        (filtroMes!==mesAtual||filtroPlaca)
          ? h('div',{style:'display:flex;align-items:flex-end'},
              h('button',{
                style:'padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer',
                onClick:function(){setFiltroMes(mesAtual);setFiltroPlaca('');}
              },'x Limpar')
            )
          : null
      )
    ),

    // KPIs
    h('div',{class:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      h(KPI,{label:'Registros no Período',value:manutFiltradas.length,color:'blue',icon:'wrench'}),
      h(KPI,{label:'Custo do Período',value:R(totalPeriodo),color:'purple',icon:'chart'}),
      h(KPI,{label:'Veículos Envolvidos',value:placasPeriodo,color:'orange',icon:'truck'}),
      h(KPI,{label:'Custo Total Geral',value:R(totalGeral),color:'green',icon:'chart'})
    ),

    // Tabela Planilha
    h('div',{class:'card',style:'padding:0;overflow:hidden'},
      h('div',{style:'display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e2e8f0'},
        h('div',null,
          h('h3',{style:'font-weight:800;font-size:13px;color:#071A35'},'Manutencoes — '+mesLabel(filtroMes)),
          h('p',{style:'font-size:11px;color:#94a3b8;margin-top:2px'},
            manutOrdenadas.length+' registro'+(manutOrdenadas.length!==1?'s':'')+(filtroPlaca?' · '+filtroPlaca:'')
          )
        ),
        manutOrdenadas.length>0
          ? h('span',{style:'font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;background:#dbeafe;color:#1d4ed8'},R(totalPeriodo)+' total')
          : null
      ),
      h('div',{style:'overflow-x:auto'},
        manutOrdenadas.length===0
          ? h('div',{style:'padding:60px;text-align:center'},h(Empty,{msg:'Nenhuma manutencao encontrada para este periodo',icon:'wrench'}))
          : h('table',{style:'width:100%;border-collapse:collapse;min-width:820px'},
              h('thead',null,
                h('tr',null,
                  renderTh('placa','Placa'),
                  renderTh('tipo_servico','Tipo de Servico'),
                  renderTh('descricao','Descricao'),
                  renderTh('oficina','Oficina'),
                  renderTh('km','KM'),

function PageMultas({multas, caminhoes, onOk}) {
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filtroMes, setFiltroMes] = useState('todos');
  const sorted = useMemo(() => [...multas].sort((a, b) => String(b.data_infracao).localeCompare(String(a.data_infracao))), [multas]);
  const filtradas = useMemo(() => {
    if (filtroMes === 'todos') return sorted;
    return sorted.filter(m => {
      if (!m.data_infracao) return false;
      try {
        const d = new Date(m.data_infracao + 'T12:00:00');
        const mes = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
        return mes === filtroMes;
      } catch (e) { return false; }
    });
  }, [sorted, filtroMes]);
  const totalValor = filtradas.reduce((s, m) => s + num(m.valor), 0);
  const descontadas = filtradas.filter(m => String(m.descontado_folha).toLowerCase() === 'sim').length;
  const porPlaca = useMemo(() => {
    const map = {};
    filtradas.forEach(m => { if (m.placa) map[m.placa] = (map[m.placa] || 0) + 1; });
    return Object.keys(map).map(pl => ({pl, v: map[pl]})).sort((a, b) => b.v - a.v).slice(0, 8);
  }, [filtradas]);
  const meses = useMemo(() => {
    const set = new Set();
    multas.forEach(m => {
      if (!m.data_infracao) return;
      try {
        const d = new Date(m.data_infracao + 'T12:00:00');
        set.add(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
      } catch (e) {}
    });
    return Array.from(set).sort((a, b) => b.localeCompare(a));
  }, [multas]);
  const exportar = () => exportDashboardHTML({
    title: 'Dashboard de Multas',
    subtitle: filtroMes === 'todos' ? 'Todas as multas registradas' : 'Período: ' + filtroMes,
    accent: '#dc2626',
    kpis: [
      {label:'Total de Multas', value: filtradas.length, color:'#2563eb'},
      {label:'Valor Total', value: R(totalValor), color:'#dc2626'},
      {label:'Descontadas em Folha', value: descontadas, sub: filtradas.length ? Math.round(descontadas / filtradas.length * 100) + '% do total' : '', color:'#16a34a'},
      {label:'Veículos Envolvidos', value: new Set(filtradas.map(m => m.placa).filter(Boolean)).size, color:'#8b5cf6'}
    ],
    headers: ['Placa', 'Motorista', 'Local', 'Data', 'Romaneio', 'Rota', 'Valor', 'Descont. Folha'],
    rows: filtradas.map(m => [
      str(m.placa), str(m.motorista), str(m.local_infracao), D(m.data_infracao),
      str(m.romaneio) || '—', str(m.rota) || '—', num(m.valor) ? R(m.valor) : '—', str(m.descontado_folha)
    ])
  });
  const del = m => askConfirm('Excluir multa', 'Remover multa de ' + m.placa + '?', async () => {
    try { await api.del('multas', m.id); toast('Excluída'); onOk(); } catch (e) { toast(e.message, 'err'); }
  });
  return h('div', {class:'p-5 space-y-5'},
    h('div', {class:'flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3'},
      h('div', null,
        h('h2', {class:'text-xl font-extrabold', style:'color:#071A35'}, 'Multas'),
        h('p', {class:'text-sm text-slate-400 mt-0.5'}, 'Controle de infrações e descontos em folha')
      ),
      h('div', {class:'flex gap-2 flex-wrap'},
        h('button', {class:'btn btn-outline', onClick:exportar}, h(Ic, {n:'dl', s:15}), 'Exportar Dashboard'),
        h('button', {class:'btn btn-primary', onClick:() => { setEditing(null); setModal(true); }}, h(Ic, {n:'plus', s:15}), 'Nova Multa')
      )
    ),
    h('div', {class:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      h(KPI, {label:'Multas', value:filtradas.length, color:'blue', icon:'ticket'}),
      h(KPI, {label:'Valor Total', value:R(totalValor), color:'red', icon:'chart'}),
      h(KPI, {label:'Descontadas', value:descontadas, sub:filtradas.length - descontadas + ' pendentes', color:'green', icon:'ok'}),
      h(KPI, {label:'Veículos', value:new Set(filtradas.map(m => m.placa).filter(Boolean)).size, color:'purple', icon:'truck'})
    ),
    h('div', {class:'card', style:'padding:16px 20px'},
      h('label', {class:'inp-label'}, 'Filtrar por mês'),
      h('select', {class:'inp', style:'max-width:220px', value:filtroMes, onChange:e => setFiltroMes(e.target.value)},
        h('option', {value:'todos'}, 'Todos os períodos'),
        meses.map(m => h('option', {key:m, value:m}, m))
      )
    ),
    h('div', {class:'grid grid-cols-1 lg:grid-cols-2 gap-5'},
      h('div', {class:'card'},
        h('h3', {class:'text-sm font-bold mb-4', style:'color:#071A35'}, 'Multas por Placa'),
        porPlaca.length > 0
          ? h(BarChart, {id:'m-placa', labels:porPlaca.map(x => x.pl), data:porPlaca.map(x => x.v), color:'#dc2626'})
          : h(Empty, {msg:'Nenhuma multa no período', icon:'ticket'})
      ),
      h('div', {class:'card'},
        h('h3', {class:'text-sm font-bold mb-4', style:'color:#071A35'}, 'Desconto em Folha'),
        filtradas.length > 0
          ? h(DonutChart, {id:'m-folha', labels:['Descontadas', 'Não descontadas'], data:[descontadas, filtradas.length - descontadas]})
          : h(Empty, {msg:'Sem dados', icon:'chart'})
      )
    ),
    h('div', {class:'card'},
      filtradas.length > 0
        ? h('div', {class:'tbl-wrap'},
            h('table', null,
              h('thead', null, h('tr', null, ['Placa', 'Motorista', 'Local', 'Data', 'Romaneio', 'Rota', 'Valor', 'Folha', ''].map(l => h('th', {key:l}, l)))),
              h('tbody', null, filtradas.map(function(m){
                return h('tr', {key:m.id},
                  h('td', null, h('span', {class:'font-mono font-bold text-xs', style:'color:#071A35'}, m.placa)),
                  h('td', null, m.motorista || '—'),
                  h('td', null, m.local_infracao || '—'),
                  h('td', null, D(m.data_infracao)),
                  h('td', null, m.romaneio || '—'),
                  h('td', null, m.rota || '—'),
                  h('td', null, h('span', {class:'font-semibold', style:'color:#dc2626'}, num(m.valor) ? R(m.valor) : '—')),
                  h('td', null, h(Bdg, {v: String(m.descontado_folha).toLowerCase() === 'sim' ? 'sim' : 'nao'})),
                  h('td', null, h('div', {class:'flex gap-1'},
                    h('button', {class:'btn btn-sm btn-outline', onClick:function(){ setEditing(m); setModal(true); }}, h(Ic, {n:'edit', s:13})),
                    h('button', {class:'btn btn-sm btn-danger', onClick:function(){ del(m); }}, h(Ic, {n:'trash', s:13}))
                  ))
                );
              }))
            )
          )
        : h(Empty, {msg:'Nenhuma multa cadastrada', icon:'ticket', onAdd:() => { setEditing(null); setModal(true); }, addLabel:'Registrar multa'})
    ),
    modal ? h(ModalMulta, {onClose:() => setModal(false), onSaved:onOk, editing, caminhoes}) : null
  );
}

function PageLavagem({lavagens, caminhoes, onOk}) {
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const sorted = useMemo(() => [...lavagens].sort((a, b) => String(b.data_lavagem).localeCompare(String(a.data_lavagem))), [lavagens]);
  const hojeMs = new Date(hoje() + 'T12:00:00').getTime();
  const proximasVenc = useMemo(() => sorted.filter(l => {
    if (!l.data_proxima) return false;
    const dias = diasRestantes(l.data_proxima);
    return dias !== null && dias <= 15;
  }), [sorted]);
  const totalGasto = sorted.reduce((s, l) => s + num(l.valor), 0);
  const del = l => askConfirm('Excluir lavagem', 'Remover registro de ' + l.placa + '?', async () => {
    try { await api.del('lavagens_frota', l.id); toast('Excluída'); onOk(); } catch (e) { toast(e.message, 'err'); }
  });
  return h('div', {class:'p-5 space-y-5'},
    h('div', {class:'flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3'},
      h('div', null,
        h('h2', {class:'text-xl font-extrabold', style:'color:#071A35'}, 'Lavagem da Frota'),
        h('p', {class:'text-sm text-slate-400 mt-0.5'}, 'Controle de lavagens — ciclo de 3 meses por veículo')
      ),
      h('button', {class:'btn btn-primary', onClick:() => { setEditing(null); setModal(true); }}, h(Ic, {n:'plus', s:15}), 'Registrar Lavagem')
    ),
    h('div', {class:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      h(KPI, {label:'Lavagens', value:sorted.length, color:'blue', icon:'wash'}),
      h(KPI, {label:'Gasto Total', value:R(totalGasto), color:'purple', icon:'chart'}),
      h(KPI, {label:'Próximas (15 dias)', value:proximasVenc.length, color: proximasVenc.length ? 'orange' : 'green', icon:'bell'}),
      h(KPI, {label:'Veículos', value:new Set(sorted.map(l => l.placa).filter(Boolean)).size, color:'green', icon:'truck'})
    ),
    proximasVenc.length > 0 ? h('div', {class:'card', style:'background:#fffbeb;border:1.5px solid #fde68a'},
      h('h3', {class:'text-sm font-bold mb-3', style:'color:#92400e'}, '⚠️ Lavagens próximas do vencimento'),
      h('div', {class:'space-y-2'},
        proximasVenc.slice(0, 8).map(l => {
          const dias = diasRestantes(l.data_proxima);
          return h('div', {key:l.id, class:'flex justify-between items-center p-3 rounded-xl', style:'background:#fff'},
            h('span', {class:'font-mono font-bold', style:'color:#071A35'}, l.placa),
            h('span', {class:'text-sm text-slate-500'}, 'Próxima: ' + D(l.data_proxima)),
            h('span', {class:'badge b-yellow'}, dias <= 0 ? 'Vencida' : dias + ' dias')
          );
        })
      )
    ) : null,
    h('div', {class:'card'},
      sorted.length > 0
        ? h('div', {class:'tbl-wrap'},
            h('table', null,
              h('thead', null, h('tr', null, ['Placa', 'Data Lavagem', 'Próxima (3 meses)', 'Valor', 'Status', ''].map(l => h('th', {key:l}, l)))),
              h('tbody', null, sorted.map(l => {
                const dias = diasRestantes(l.data_proxima);
                const st = dias === null ? '—' : dias <= 0 ? 'Vencida' : dias <= 15 ? 'Em breve' : 'Em dia';
                const cls = dias !== null && dias <= 0 ? 'b-red' : dias !== null && dias <= 15 ? 'b-yellow' : 'b-green';
                return h('tr', {key:l.id},
                  h('td', null, h('span', {class:'font-mono font-bold', style:'color:#071A35'}, l.placa)),
                  h('td', null, D(l.data_lavagem)),
                  h('td', null, D(l.data_proxima)),
                  h('td', null, num(l.valor) ? R(l.valor) : '—'),
                  h('td', null, h('span', {class:'badge ' + cls}, st)),
                  h('td', null, h('div', {class:'flex gap-1'},
                    h('button', {class:'btn btn-sm btn-outline', onClick:() => { setEditing(l); setModal(true); }}, h(Ic, {n:'edit', s:13})),
                    h('button', {class:'btn btn-sm btn-danger', onClick:() => del(l)}, h(Ic, {n:'trash', s:13}))
                  ))
                );
              }))
            )
          )
        : h(Empty, {msg:'Nenhuma lavagem registrada', icon:'wash', onAdd:() => { setEditing(null); setModal(true); }, addLabel:'Registrar lavagem'})
    ),
    modal ? h(ModalLavagem, {onClose:() => setModal(false), onSaved:onOk, editing, caminhoes}) : null
  );
}

// ═══════════════════════════════════════
// EXPORT — Dashboard HTML para impressão/PDF
// ═══════════════════════════════════════
function exportDashboardHTML(opts) {
  const title = opts.title || 'Relatório';
  const subtitle = opts.subtitle || '';
  const kpis = opts.kpis || [];
  const headers = opts.headers || [];
  const rows = opts.rows || [];
  const accent = opts.accent || '#071A35';
  const kpiHtml = kpis.map(function (k) {
    return '<div style="flex:1;min-width:140px;background:#fff;border-radius:14px;padding:18px 20px;border-left:4px solid ' + (k.color || accent) + ';box-shadow:0 2px 8px rgba(7,26,53,.08)">'
      + '<div style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em">' + k.label + '</div>'
      + '<div style="font-size:28px;font-weight:800;color:' + (k.color || accent) + ';margin-top:6px">' + k.value + '</div>'
      + (k.sub ? '<div style="font-size:12px;color:#94a3b8;margin-top:4px">' + k.sub + '</div>' : '')
      + '</div>';
  }).join('');
  const thHtml = headers.map(function (h) {
    return '<th style="padding:12px 14px;text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;background:#f8fafc;border-bottom:2px solid #e2e8f0">' + h + '</th>';
  }).join('');
  const trHtml = rows.map(function (row, i) {
    return '<tr style="background:' + (i % 2 ? '#fafbfc' : '#fff') + '">' + row.map(function (cell) {
      return '<td style="padding:11px 14px;font-size:13px;color:#334155;border-bottom:1px solid #f1f5f9">' + cell + '</td>';
    }).join('') + '</tr>';
  }).join('');
  const html = '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><title>' + title + '</title>'
    + '<style>@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}body{font-family:Segoe UI,Roboto,sans-serif;background:#F0F2F5;margin:0;padding:32px;color:#1e293b}'
    + '.hdr{background:linear-gradient(135deg,' + accent + ',#2563eb);color:#fff;border-radius:16px;padding:28px 32px;margin-bottom:24px}'
    + '.kpis{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:24px}.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(7,26,53,.08)}'
    + '.foot{margin-top:24px;font-size:12px;color:#94a3b8;text-align:center}</style></head><body>'
    + '<div class="hdr"><h1 style="margin:0;font-size:26px;font-weight:800">' + title + '</h1>'
    + (subtitle ? '<p style="margin:8px 0 0;opacity:.85;font-size:14px">' + subtitle + '</p>' : '')
    + '<p style="margin:12px 0 0;font-size:12px;opacity:.7">Gerado em ' + new Date().toLocaleString('pt-BR') + '</p></div>'
    + '<div class="kpis">' + kpiHtml + '</div>'
    + '<table class="tbl"><thead><tr>' + thHtml + '</tr></thead><tbody>' + trHtml + '</tbody></table>'
    + '<div class="foot">Vila Ema — Controle de Frota</div>'
    + '<script>window.onload=function(){setTimeout(function(){window.print()},400)}<\/script></body></html>';
  const w = window.open('', '_blank');
  if (!w) { toast('Permita pop-ups para exportar o relatório', 'warn'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
  toast('Relatório aberto — use Imprimir ou Salvar como PDF');
}

// ═══════════════════════════════════════
// PAGE — CONFIGURAÇÕES
// ═══════════════════════════════════════
function PageConfig(){
  const[st,setSt]=useState({});
  const fileRef=useRef(null);
  useEffect(function(){
    if(!window.VilaEmaStorage)return;
    var p=window.VilaEmaStorage.stats();
    if(p&&p.then)p.then(setSt);else setSt(p||{});
  },[]);
  function downloadBackup(){
    var p=window.VilaEmaStorage.exportAll();
    Promise.resolve(p).then(function(data){
      var a=document.createElement('a');
      a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
      a.download='frota-vilaema-backup-'+hoje()+'.json';
      a.click();
      toast('Backup exportado!');
    }).catch(function(e){toast(e.message,'err');});
  }
  function importBackup(file){
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(){
      try{
        var data=JSON.parse(reader.result);
        Promise.resolve(window.VilaEmaStorage.importAll(data,false)).then(function(){
          toast('Backup restaurado! Recarregando…');
          setTimeout(function(){location.reload();},800);
        }).catch(function(e){toast('Erro ao importar: '+e.message,'err');});
      }catch(e){toast('Arquivo inválido: '+e.message,'err');}
    };
    reader.readAsText(file);
  }
  function clearData(){
    askConfirm('Apagar todos os dados','Isso remove frota, manutenções, pneus e checklists do Firebase.',function(){
      Promise.resolve(window.VilaEmaStorage.clearAll()).then(function(){
        toast('Dados apagados');
        setTimeout(function(){location.reload();},600);
      }).catch(function(e){toast(e.message,'err');});
    },'Apagar tudo');
  }
  return h('div',{class:'p-5'},
    h('div',{class:'max-w-lg space-y-4'},
      h('div',{class:'card'},
        h('h3',{class:'font-bold mb-4',style:'color:#071A35'},'Sobre o Sistema'),
        h('dl',{class:'space-y-2 text-sm'},
          [['Sistema','Controle de Frota Vila Ema'],['Versao','v3.8 Firebase'],['Armazenamento','Firebase Firestore (nuvem)'],['Framework','Preact 10.19 + Tailwind CSS'],['Graficos','Chart.js 4.4']].map(function(pair){
            return h('div',{key:pair[0],class:'flex justify-between py-1.5',style:'border-bottom:1px solid #f1f5f9'},
              h('dt',{class:'text-slate-400'},pair[0]),h('dd',{class:'font-semibold'},pair[1])
            );
          })
        )
      ),
      h('div',{class:'card'},
        h('h3',{class:'font-bold mb-3',style:'color:#071A35'},'💾 Backup dos Dados'),
        h('p',{class:'text-sm text-slate-500 mb-4'},
          'Os dados ficam no Firebase (nuvem). Exporte um backup JSON periodicamente como cópia de segurança.'
        ),
        h('div',{class:'grid grid-cols-2 gap-2 mb-3 text-sm'},
          Object.keys(st).map(function(k){
            return h('div',{key:k,class:'p-3 rounded-lg',style:'background:#f8fafc'},
              h('div',{class:'text-xs text-slate-400 uppercase'},k),
              h('div',{class:'font-bold text-lg',style:'color:#071A35'},st[k]||0)
            );
          })
        ),
        h('div',{class:'flex flex-col sm:flex-row flex-wrap gap-2'},
          h('button',{class:'btn btn-primary flex-1',onClick:downloadBackup},'⬇️ Exportar backup JSON'),
          h('button',{
            class:'btn flex-1',
            style:'background:#fff;color:#2563eb;border:2px solid #2563eb;font-weight:700',
            onClick:function(){if(fileRef.current)fileRef.current.click();}
          },'📂 Importar backup JSON'),
          h('input',{ref:fileRef,type:'file',accept:'application/json,.json',style:'display:none',onChange:function(e){importBackup(e.target.files[0]);e.target.value='';}}),
          h('button',{class:'btn btn-danger btn-sm',onClick:clearData},'🗑️ Apagar dados')
        ),
        h('p',{class:'text-xs text-slate-400 mt-3'},
          'Importar: escolha um arquivo .json exportado antes (backup da frota, manutenções, pneus e checklists).'
        )
      ),
      h('div',{class:'card'},
        h('h3',{class:'font-bold mb-3',style:'color:#071A35'},'Tipos de Veículo — Referência'),
        h('div',{class:'grid grid-cols-2 gap-2'},
          Object.keys(TIPOS_VEICULO).map(function(k){
            var v=TIPOS_VEICULO[k];
            return h('div',{key:k,class:'flex justify-between p-3 rounded-xl',style:'background:#f8fafc'},
              h('span',{class:'font-semibold text-sm',style:'color:#071A35'},k),
              h('span',{class:'text-xs text-slate-400'},v.eixos+' eixos · '+v.pneus+' pneus')
            );
          })
        )
      )
    )
  );
}

// APP ROOT
// ═══════════════════════════════════════
function App(){
  const[page,setPage]=useState('dashboard');
  const[sbOpen,setSb]=useState(false);
  const[loading,setLoading]=useState(true);
  const[caminhoes,setCaminhoes]=useState([]);
  const[manutencoes,setManut]=useState([]);
  const[pneus,setPneus]=useState([]);
  const[checklists,setChks]=useState([]);
  const[multas,setMultas]=useState([]);
  const[lavagens,setLavagens]=useState([]);
  const[time,setTime]=useState('');

  const alertas=useMemo(function(){
    var base=gerarAlertas(caminhoes,manutencoes,pneus);
    gerarAlertasOleo(caminhoes,manutencoes,[]).forEach(function(a){
      base.push({
        lvl: a.urgencia==='vencida'?'critical':'warn',
        cat: 'Oleo/Revisao',
        msg: a.urgencia==='vencida'
          ? 'Troca de oleo VENCIDA ('+N(a.kmFalta)+' km atrasada)'
          : 'Troca de oleo em '+N(a.falta)+' km',
        pl: a.placa
      });
    });
    gerarAlertasTacografo(caminhoes).forEach(function(a){
      base.push({
        lvl: a.urgencia==='vencida'?'critical':'warn',
        cat: 'Tacografo',
        msg: a.urgencia==='vencida'
          ? 'Calibração do tacógrafo VENCIDA há '+Math.abs(a.diasRestantes)+' dias'
          : 'Calibração do tacógrafo vence em '+a.diasRestantes+' dias',
        pl: a.placa
      });
    });
    return base;
  },[caminhoes,manutencoes,pneus]);

  const load=useCallback(async function(silent){
    if(silent===undefined)silent=false;
    if(!silent)setLoading(true);
    try{
      if(window.VilaEmaStorage&&window.VilaEmaStorage.whenAuthReady){
        var user=await window.VilaEmaStorage.whenAuthReady();
        if(!user){
          if(!silent)setLoading(false);
          return;
        }
      }
      await Promise.race([
        ensureSchemas(),
        new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout schemas'));},15000);})
      ]).catch(function(e){console.warn('[load] ensureSchemas:',e.message);});

      const results=await Promise.allSettled([
        api.list('caminhoes'),
        api.list('manutencoes'),
        api.list('trocas_pneus'),
        api.list('checklists',200),
        api.list('multas',500),
        api.list('lavagens_frota',500)
      ]);
      var rc=results[0],rm=results[1],rp=results[2],rk=results[3],rmt=results[4],rlv=results[5];

      if(rc.status==='fulfilled'){
        console.log('[load] caminhoes OK →',rc.value.length,'registros');
        setCaminhoes(rc.value);
      }else{
        console.error('[load] caminhoes ERRO:',rc.reason&&rc.reason.message);
        if(!silent)toast('Erro caminhoes: '+(rc.reason&&rc.reason.message),'warn');
      }

      if(rm.status==='fulfilled'){
        console.log('[load] manutencoes OK →',rm.value.length,'registros');
        setManut(rm.value);
      }else{
        console.error('[load] manutencoes ERRO:',rm.reason&&rm.reason.message);
        if(!silent)toast('Erro manutencoes: '+(rm.reason&&rm.reason.message),'warn');
      }

      if(rp.status==='fulfilled'){
        console.log('[load] pneus OK →',rp.value.length,'registros');
        setPneus(rp.value);
      }else{
        console.error('[load] pneus ERRO:',rp.reason&&rp.reason.message);
        if(!silent)toast('Erro pneus: '+(rp.reason&&rp.reason.message),'warn');
      }

      if(rk.status==='fulfilled'){
        console.log('[load] checklists OK →',rk.value.length,'registros');
        setChks(rk.value.slice().sort(function(a,b){return (num(b.created_at)||0)-(num(a.created_at)||0);}));
      }else{
        console.error('[load] checklists ERRO:',rk.reason&&rk.reason.message);
        if(!silent)toast('Erro checklists: '+(rk.reason&&rk.reason.message),'warn');
      }

      if(rmt.status==='fulfilled'){
        setMultas(rmt.value);
      }else if(!silent&&rmt.reason)toast('Erro multas: '+rmt.reason.message,'warn');

      if(rlv.status==='fulfilled'){
        setLavagens(rlv.value);
      }else if(!silent&&rlv.reason)toast('Erro lavagens: '+rlv.reason.message,'warn');
    }catch(e){
      console.error('[load] Erro geral:',e.message);
      if(!silent)toast('Erro ao carregar: '+e.message,'err');
    }finally{
      if(!silent)setLoading(false);
    }
  },[]);

  useEffect(()=>{
    load();
    const iv=setInterval(()=>load(true),30000);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    const iv=setInterval(()=>setTime(new Date().toLocaleTimeString('pt-BR')),1000);
    setTime(new Date().toLocaleTimeString('pt-BR'));
    return()=>clearInterval(iv);
  },[]);

  const crits=alertas.filter(a=>a.lvl==='critical').length;
  const tacografoAlertas=useMemo(()=>gerarAlertasTacografo(caminhoes).length,[caminhoes]);

  const NAV=[
    {id:'dashboard',ico:'dash',  lbl:'Dashboard'},
    {id:'frota',    ico:'truck', lbl:'Frota',        cnt:caminhoes.length},
    {id:'maint',    ico:'wrench',lbl:'Manutenções',  cnt:manutencoes.filter(m=>m.status==='pendente').length||null},
    {id:'pneus',    ico:'tire',  lbl:'Pneus',        cnt:pneus.length||null},
    {id:'tacografo',ico:'clock', lbl:'Tacógrafo',    cnt:tacografoAlertas||null,red:!!tacografoAlertas},
    {id:'checklist',ico:'check', lbl:'Checklist'},
    {id:'multas',   ico:'ticket',lbl:'Multas',       cnt:multas.length||null},
    {id:'lavagem',  ico:'wash',  lbl:'Lavagem',      cnt:lavagens.filter(l=>{const d=diasRestantes(l.data_proxima);return d!==null&&d<=15;}).length||null},
    {id:'alertas',  ico:'bell',  lbl:'Alertas',      cnt:crits||null,red:true},
    {id:'relat',    ico:'chart', lbl:'Relatórios'},
    {id:'config',   ico:'gear',  lbl:'Configurações'},
  ];

  const TITLES={
    dashboard:'Dashboard',frota:'Frota de Veículos',maint:'Manutenções',
    pneus:'Controle de Pneus',tacografo:'Controle de Tacógrafo',checklist:'Checklist de Veículos',
    multas:'Multas',lavagem:'Lavagem da Frota',
    alertas:'Alertas',relat:'Relatórios',config:'Configurações'
  };

  const pp={caminhoes,manutencoes,pneus,checklists,multas,lavagens,alertas,onOk:load,goTo:setPage};

  const renderPage=()=>{
    switch(page){
      case'dashboard':return h(PageDash,  pp);
      case'frota':    return h(PageFrota, pp);
      case'maint':    return h(PageMaint, pp);
      case'pneus':    return h(PagePneus, pp);
      case'tacografo':return h(PageTacografo,pp);
      case'checklist':return h(PageChecklist,pp);
      case'multas':   return h(PageMultas,   pp);
      case'lavagem':  return h(PageLavagem,  pp);
      case'alertas':  return h(PageAlertas, pp);
      case'relat':    return h(PageRelat, pp);
      case'config':   return h(PageConfig,null);
      default:        return h('div',{class:'p-6 text-slate-400'},'Página não encontrada');
    }
  };

  var goTo=function(id){setPage(id);setSb(false);};

  var authUser=null;
  try{
    var _s=sessionStorage.getItem('ve_auth_v1');
    if(_s)authUser=JSON.parse(_s);
  }catch(e){}

  return h(Fragment,null,
    sbOpen?h('div',{class:'fixed inset-0 bg-black/40 z-40 md:hidden',onClick:()=>setSb(false)}):null,
    h('div',{class:'flex h-screen overflow-hidden'},
      // ─── Sidebar ───────────────────────────────
      h('aside',{
        id:'sb',
        class:cx('fixed top-0 left-0 h-full flex flex-col z-50',sbOpen&&'open'),
        style:'width:236px;background:#071A35;min-height:100vh'
      },
        // ── Logo Vila Ema ──────────────────────────
        h('div',{class:'flex flex-col items-center py-5 px-4',style:'border-bottom:1px solid rgba(255,255,255,.09)'},
          // Logo mark — 3 barras inclinadas como na imagem
          h('div',{style:'width:54px;height:54px;background:linear-gradient(135deg,#1e40af,#2563eb);border-radius:13px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,99,235,.4);margin-bottom:10px;flex-shrink:0'},
            h('svg',{width:'30',height:'30',viewBox:'0 0 30 30',fill:'none'},
              h('rect',{x:'2',y:'8',width:'8',height:'18',rx:'2',fill:'white',transform:'skewX(-8)'}),
              h('rect',{x:'11',y:'4',width:'8',height:'22',rx:'2',fill:'white',transform:'skewX(-8)'}),
              h('rect',{x:'20',y:'11',width:'8',height:'15',rx:'2',fill:'white',transform:'skewX(-8)'})
            )
          ),
          h('div',{class:'text-white font-extrabold text-base tracking-wide'},'VILA EMA'),
          h('div',{class:'text-blue-400 text-xs font-medium tracking-widest mt-0.5',style:'letter-spacing:.12em'},'CONTROLE DE FROTA')
        ),
        h('nav',{class:'flex-1 px-2 py-3 space-y-0.5 overflow-y-auto'},
          NAV.map(item=>h('button',{
            key:item.id,
            class:cx('sb-btn',page===item.id&&'active'),
            onClick:()=>goTo(item.id)

            h(Ic,{n:item.ico,s:16}),
            h('span',{class:'flex-1'},item.lbl),
            item.cnt?h('span',{class:cx('text-xs font-bold px-1.5 py-0.5 rounded-full',item.red?'bg-red-500 text-white':'bg-blue-600/40 text-blue-300')},item.cnt):null
          ))

            '👤 '+ (authUser.label||authUser.user)
          ):null,
          h('button',{
            class:'sb-btn text-red-400 hover:text-red-300 w-full',
            style:'margin-bottom:6px',
            onClick:function(){
              var out=window.VilaEmaFirebase&&window.VilaEmaFirebase.signOut

          )
        ),
        loading?h('div',{class:'h-0.5 bg-blue-500 w-full',style:'animation:prog 1.2s ease infinite'}):null,
        h('main',{class:'flex-1 overflow-y-auto'},renderPage())
      )
    ),
    h(Toasts,null),
    h(Confirm,null)
  );
}

try{
  render(h(App,null),document.getElementById('root'));
}catch(e){
  console.error('[RENDER ERROR]',e);
  document.getElementById('root').innerHTML=
    '<div style="font-family:monospace;padding:40px;color:#dc2626;background:#fff;min-height:100vh">'
    +'<h2 style="font-size:1.2rem;margin-bottom:12px">❌ Erro ao carregar o sistema</h2>'
    +'<pre style="background:#fef2f2;padding:16px;border-radius:8px;font-size:.8rem;white-space:pre-wrap">'+e.stack+'</pre>'
    +'<p style="margin-top:16px;color:#64748b;font-size:.85rem">Abra o console do navegador (F12) para mais detalhes.</p>'
    +'</div>';
}
</script>
</body>
</html>
