// ─── Bootstrap de schema via POST de registro de teste ──────────────────
// Quando o ambiente publicado não reconhece os schemas,
// faz um POST com dados de teste para forçar o registro,
// depois deleta o registro de teste.
async function bootstrapSchema(schema) {
  const testRow = {};
  schema.fields.forEach(f => {
    if (f.name === 'id') return;
    testRow[f.name] = f.type === 'number' ? 0 : '';
  });
  testRow.created_at = new Date().toISOString().slice(0,10);
  try {
    const r = await fetch('tables/' + schema.name, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(testRow)
    });
    if (r.ok || r.status === 201) {
      const d = await r.json().catch(() => null);
      if (d && d.id) {
        await fetch('tables/' + schema.name + '/' + d.id, { method: 'DELETE' });
      }
      console.log('[bootstrap] ✅', schema.name);
      return true;
    }
    console.warn('[bootstrap] ❌', schema.name, r.status);
    return false;
  } catch(e) {
    console.warn('[bootstrap] ❌', schema.name, e.message);
    return false;
  }
}

// ─── Verifica e registra todas as tabelas necessárias ───────────────────
let _schemasReady = false;
async function ensureSchemas() {
  if (_schemasReady) return;
  // Testa se caminhoes responde OK
  try {
    const r = await fetch('tables/caminhoes?limit=1&page=1');
    const d = await r.json().catch(() => ({}));
    if (r.ok) { _schemasReady = true; return; }
    // Se retornou erro de schema, tenta bootstrap
    const errStr = JSON.stringify(d);
    if (errStr.includes('schema') || errStr.includes('table')) {
      console.warn('[ensureSchemas] Schemas não encontrados — iniciando bootstrap…');
      const results = await Promise.allSettled(TABLE_SCHEMAS.map(s => bootstrapSchema(s)));
      const ok = results.filter(r => r.status === 'fulfilled' && r.value).length;
      console.log('[ensureSchemas] Bootstrap concluído:', ok + '/' + TABLE_SCHEMAS.length + ' tabelas');
    }
  } catch(e) {
    console.warn('[ensureSchemas] Erro:', e.message);
  }
  _schemasReady = true;
}

// ═══════════════════════════════════════
// API — localStorage via js/storage-api.js (intercepta fetch tables/*)
// ═══════════════════════════════════════
const api={
  async _req(method,path,body){
    const opts={method,headers:{}};
    if(body!==undefined){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}
    let res;
    try{
      res=await fetch(path,opts);
    }
    catch(e){throw new Error('Sem conexão: '+e.message);}
    if(res.status===204)return null;
    let data=null;
    try{data=await res.json();}catch(_e){data=null;}
    if(!res.ok){
      const detail=data?JSON.stringify(data).slice(0,300):('HTTP '+res.status);
      console.error('[API]',method,path,'→',res.status,detail);
      throw new Error('HTTP '+res.status+' — '+detail);
    }
    return data;
  },
  list(t,lim=500){return this._req('GET','tables/'+t+'?limit='+lim+'&page=1').then(d=>Array.isArray(d?.data)?d.data:[]);},
  post(t,b){return this._req('POST','tables/'+t,b);},
  put(t,id,b){return this._req('PUT','tables/'+t+'/'+id,b);},
  patch(t,id,b){return this._req('PATCH','tables/'+t+'/'+id,b);},
  del(t,id){return this._req('DELETE','tables/'+t+'/'+id);}
};

function parseTiposServ(v){
  if(!v)return[];
  if(Array.isArray(v))return v.filter(Boolean);
  return String(v).split(/[,;|]/).map(s=>s.trim()).filter(Boolean);
}
function joinTiposServ(arr){return (arr||[]).filter(Boolean).join(', ');}
function TiposServBadges({value}){
  const tips=parseTiposServ(value);
  if(!tips.length)return h('span',{class:'text-slate-300 text-xs'},'—');
  return h('div',{class:'flex flex-wrap gap-1'},
    tips.map(t=>h('span',{key:t,class:'badge b-blue',style:'font-size:.65rem;white-space:normal'},t))
  );
}
function TiposServCheckboxes({value,onChange}){
  const sel=parseTiposServ(value);
  const toggle=t=>{
    const next=sel.includes(t)?sel.filter(x=>x!==t):sel.concat([t]);
    onChange(joinTiposServ(next));
  };
  return h('div',{class:'serv-chk-grid'},
    TIPOS_SERV.map(t=>h('label',{key:t},
      h('input',{type:'checkbox',checked:sel.includes(t),onChange:()=>toggle(t)}),
      t
    ))
  );
}

let _toast=null;
function Toasts(){
  const[list,setList]=useState([]);
  _toast=(msg,type='ok')=>{
    const id=Date.now()+Math.random();
    setList(p=>[...p,{id,msg:str(msg).slice(0,200),type}]);
    setTimeout(()=>setList(p=>p.filter(x=>x.id!==id)),4500);
  };
  return h('div',{class:'toast-wrap'},
    list.map(t=>h('div',{key:t.id,class:'toast t-'+t.type},
      t.type==='ok'?'✅':t.type==='err'?'❌':'⚠️',
      h('span',null,t.msg)
    ))
  );
}
const toast=(m,t='ok')=>_toast&&_toast(m,t);

let _confirm=null;
function Confirm(){
  const[cfg,set]=useState(null);
  _confirm=set;
  if(!cfg)return h(Fragment,null);
  return h('div',{class:'overlay',onClick:()=>set(null)},
    h('div',{class:'modal',style:'max-width:360px;padding:28px',onClick:e=>e.stopPropagation()},
      h('p',{class:'font-bold text-lg mb-2'},cfg.title),
      h('p',{class:'text-sm text-slate-500 mb-6'},cfg.msg),
      h('div',{class:'flex gap-3 justify-end'},
        h('button',{class:'btn btn-ghost',onClick:()=>set(null)},'Cancelar'),
        h('button',{class:'btn btn-danger',onClick:()=>{cfg.ok();set(null);}},cfg.label||'Excluir')
      )
    )
  );
}
const askConfirm=(title,msg,ok,label)=>_confirm&&_confirm({title,msg,ok,label});

const CI={};
const destroyC=id=>{if(CI[id]){CI[id].destroy();delete CI[id];}};
function BarChart({id,labels,data,color='#2563eb',height=220}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    destroyC(id);
    CI[id]=new Chart(ref.current,{
      type:'bar',
      data:{labels,datasets:[{data,backgroundColor:color+'cc',borderColor:color,borderWidth:1.5,borderRadius:5}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>R(ctx.raw)}}},scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k',font:{size:11}}},x:{grid:{display:false},ticks:{font:{size:11}}}}}
    });
    return()=>destroyC(id);
  },[labels.join('|'),data.join('|')]);
  return h('div',{style:'height:'+height+'px'},h('canvas',{ref}));
}
function DonutChart({id,labels,data,height=220}){
  const ref=useRef(null);
  const COLS=['#2563eb','#22c55e','#f59e0b','#ef4444','#8b5cf6','#06b6d4'];
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    destroyC(id);
    CI[id]=new Chart(ref.current,{
      type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:COLS,borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},padding:10}}}}
    });
    return()=>destroyC(id);
  },[labels.join('|'),data.join('|')]);
  return h('div',{style:'height:'+height+'px'},h('canvas',{ref}));
}

function gerarAlertas(caminhoes,manutencoes,pneus){
  const list=[];
  caminhoes.forEach(c=>{
    const pl=c.placa||'—';
    if(c.vencimento_ipva){
      const d=diasRestantes(c.vencimento_ipva);
      if(d!==null){
        if(d<0)list.push({lvl:'critical',cat:'IPVA/Doc',msg:'IPVA/Doc VENCIDO há '+Math.abs(d)+' dias',pl});
        else if(d<=30)list.push({lvl:'warn',cat:'IPVA/Doc',msg:'IPVA/Doc vence em '+d+' dias',pl});
      }
    }
    if(c.vencimento_seguro){
      const d=diasRestantes(c.vencimento_seguro);
      if(d!==null){
        if(d<0)list.push({lvl:'critical',cat:'Seguro',msg:'Seguro VENCIDO há '+Math.abs(d)+' dias',pl});
        else if(d<=30)list.push({lvl:'warn',cat:'Seguro',msg:'Seguro vence em '+d+' dias',pl});
      }
    }
  });
  pneus.forEach(p=>{
    const d=num(p.desgaste);
    const pl=p.placa||'—';
    if(d>=8)list.push({lvl:'critical',cat:'Pneu',msg:'Desgaste crítico ('+d+'/10) — '+str(p.posicao||'?'),pl});
    else if(d>=6)list.push({lvl:'warn',cat:'Pneu',msg:'Desgaste elevado ('+d+'/10) — '+str(p.posicao||'?'),pl});
  });
  manutencoes.filter(m=>m.status==='pendente').forEach(m=>{
    list.push({lvl:'warn',cat:'Manutenção',msg:str(m.tipo_servico)+' pendente',pl:m.placa||'—'});
  });
  return list;
}

// Verifica revisões próximas e envia WhatsApp
// ═══════════════════════════════════════
const WHATSAPP_NUMBER = '5521975710095'; // +55 21 97571-0095
const ALERTA_KM_LIMITE = 3000;
const TACOGRAFO_VALIDADE_DIAS = 730; // 2 anos — validade legal da calibração
const TACOGRAFO_ALERTA_DIAS = 12;

function diasDesdeData(s){
  if(!s)return null;
  try{return Math.floor((new Date()-new Date(s+'T12:00:00'))/864e5);}catch{return null;}
}
function addDiasData(s,dias){
  if(!s)return'';
  try{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+dias);return d.toISOString().slice(0,10);}catch{return'';}
}
function calcTacografoInfo(c){
  const data=str(c.data_calibracao_tacografo);
  if(!data)return{semDados:true,status:'sem-dados',label:'Sem registro'};
  const diasDesde=diasDesdeData(data);
  if(diasDesde===null)return{semDados:true,status:'sem-dados',label:'Data inválida'};
  const diasRestantes=TACOGRAFO_VALIDADE_DIAS-diasDesde;
  const vencimento=addDiasData(data,TACOGRAFO_VALIDADE_DIAS);
  let status,label;
  if(diasRestantes<0){status='vencida';label='Vencida';}
  else if(diasRestantes<=TACOGRAFO_ALERTA_DIAS){status='alerta';label='Renovar em breve';}
  else if(diasRestantes<=60){status='atencao';label:'Atenção';}
  else{status='ok';label:'Em dia';}
  return{data,diasDesde,diasRestantes,vencimento,semDados:false,status,label};
}
function gerarAlertasTacografo(caminhoes){
  const alertas=[];
  caminhoes.forEach(c=>{
    const t=calcTacografoInfo(c);
    if(t.semDados)return;
    if(t.status==='vencida'||t.status==='alerta'){
      alertas.push({
        placa:c.placa,modelo:c.modelo||'',motorista:c.motorista||'',
        data:t.data,diasDesde:t.diasDesde,diasRestantes:t.diasRestantes,vencimento:t.vencimento,
        urgencia:t.status==='vencida'?'vencida':'critico',
        label:t.status==='vencida'?'🔴 CALIBRAÇÃO VENCIDA':'🟡 CALIBRAÇÃO PRÓXIMA'
      });
    }
  });
  return alertas;
}

// Gera lista de alertas de óleo baseado no KM atual vs próxima troca
function gerarAlertasOleo(caminhoes, manutencoes, kmSheets=[]) {
  const alertas = [];
  caminhoes.forEach(c => {
    const trocas = manutencoes
      .filter(m => m.placa === c.placa && num(m.km_troca_oleo) > 0)
      .sort((a,b) => num(b.km_troca_oleo) - num(a.km_troca_oleo));
    const ultima = trocas[0];
    if (!ultima) return;

    const kmProxima = num(ultima.km_proxima_oleo);
    if (kmProxima <= 0) return;

    // KM atual: planilha tem prioridade
    const sheetEntry = kmSheets.find(s => normPlaca(s.placa) === normPlaca(c.placa));
    const kmAtual = sheetEntry ? sheetEntry.km : num(c.km_atual);
    const falta = kmProxima - kmAtual;

    if (falta <= 0) {
      alertas.push({
        placa: c.placa, modelo: c.modelo||'', motorista: c.motorista||'',
        kmAtual, kmProxima, falta,
        tipoOleo: str(ultima.tipo_oleo),
        urgencia: 'vencida',
        label: '🔴 TROCA VENCIDA',
        kmFalta: Math.abs(falta)
      });
    } else if (falta <= ALERTA_KM_LIMITE) {
      alertas.push({
        placa: c.placa, modelo: c.modelo||'', motorista: c.motorista||'',
        kmAtual, kmProxima, falta,
        tipoOleo: str(ultima.tipo_oleo),
        urgencia: 'critico',
        label: '🟡 REVISÃO PRÓXIMA',
        kmFalta: falta
      });
    }
  });
  return alertas;
}

// Monta a mensagem WhatsApp formatada
function montarMsgWhatsApp(alertas) {
  if (alertas.length === 0) return '';
  const linhas = [
    '🚛 *ALERTA DE FROTA — INOVERA*',
    `📅 ${new Date().toLocaleString('pt-BR')}`,
    '',
    '⚠️ *Veículos que precisam de TROCA DE ÓLEO:*',
    ''
  ];
  alertas.forEach((a, i) => {
    linhas.push(`${i+1}. ${a.label}`);
    linhas.push(`   🚗 *${a.placa}* — ${a.modelo}`);
    if (a.motorista) linhas.push(`   👤 Motorista: ${a.motorista}`);
    linhas.push(`   📍 KM atual: *${N(a.kmAtual)} km*`);
    linhas.push(`   🎯 Próxima troca: *${N(a.kmProxima)} km*`);
    if (a.urgencia === 'vencida')
      linhas.push(`   ⚠️ ATRASADA em *${N(a.kmFalta)} km*!`);
    else
      linhas.push(`   ⏳ Faltam apenas *${N(a.falta)} km*`);
    if (a.tipoOleo) linhas.push(`   🛢️ Óleo: ${a.tipoOleo}`);
    linhas.push('');
  });
  linhas.push('_Enviado pelo Sistema de Controle de Frota Vila Ema_');
  return linhas.join('\n');
}

// Abre WhatsApp com a mensagem formatada
function enviarAlertaWhatsApp(alertas) {
  const msg = montarMsgWhatsApp(alertas);
  if (!msg) return;
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

        onClick:()=>enviarAlertaWhatsApp(alertas)
      },'Enviar todos ('+alertas.length+') →')

  );

// MODAL — CAMINHÃO
// Schema: placa, tipo, marca, modelo, ano, motorista, km_atual,
//         eixos, pneus, renavam, chassi, status,
//         vencimento_ipva, vencimento_seguro, data_calibracao_tacografo, created_at
// ═══════════════════════════════════════
const BLANK_CAM={
  placa:'',tipo:'',marca:'',modelo:'',ano:new Date().getFullYear(),
  motorista:'',km_atual:'',eixos:'',pneus:'',
  renavam:'',chassi:'',status:'Ativo',
  vencimento_ipva:'',vencimento_seguro:'',data_calibracao_tacografo:''
};

function ModalCaminhao({onClose,onSaved,editing}){
  const[f,setF]=useState(editing?{...BLANK_CAM,...editing}:{...BLANK_CAM});
  const[busy,setBusy]=useState(false);
  const[info,setInfo]=useState('');
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const onTipo=t=>{
    s('tipo',t);
    const vt=TIPOS_VEICULO[t];
    if(vt){s('eixos',vt.eixos);s('pneus',vt.pneus);setInfo(t+': '+vt.eixos+' eixos · '+vt.pneus+' pneus — preenchido automaticamente');}
    else setInfo('');
  };

  const submit=async e=>{
    e.preventDefault();
    const placa=str(f.placa).trim().toUpperCase();
    const modelo=str(f.modelo).trim();
    const tipo=str(f.tipo).trim();
    if(!placa){toast('Placa é obrigatória','err');return;}
    if(!modelo){toast('Modelo é obrigatório','err');return;}
    if(!tipo){toast('Selecione o tipo do veículo','err');return;}

    // Payload 100% limpo — sem nulls, sem campos de sistema
    const payload={
      placa,
      tipo,
      marca:       str(f.marca).trim(),
      modelo,
      ano:         num(f.ano)||new Date().getFullYear(),
      motorista:   str(f.motorista).trim(),
      km_atual:    num(f.km_atual),
      eixos:       num(f.eixos),
      pneus:       num(f.pneus),
      renavam:     str(f.renavam).trim(),
      chassi:      str(f.chassi).trim(),
      status:      str(f.status)||'Ativo',
      vencimento_ipva:    str(f.vencimento_ipva),
      vencimento_seguro:  str(f.vencimento_seguro),
      data_calibracao_tacografo: str(f.data_calibracao_tacografo),
      created_at:  hoje()
    };

    console.log('[ModalCaminhao] payload →', JSON.stringify(payload));
    setBusy(true);
    try{
      if(editing&&editing.id){
        await api.put('caminhoes',editing.id,payload);
        toast('Caminhão atualizado!');
      }else{
        await api.post('caminhoes',payload);
        toast('Caminhão cadastrado com sucesso!');
      }
      onSaved();onClose();
    }catch(err){
      console.error('[ModalCaminhao] ERRO:',err.message);
      toast('Erro ao salvar: '+err.message,'err');
    }finally{setBusy(false);}
  };

  return h('div',{class:'overlay',onClick:onClose},
    h('div',{class:'modal',onClick:e=>e.stopPropagation()},
      h('div',{class:'flex items-center justify-between px-6 pt-5 pb-4',style:'border-bottom:1px solid #f1f5f9'},
        h('h2',{class:'text-base font-bold',style:'color:#071A35'},editing?'Editar Caminhão':'Cadastrar Caminhão'),
        h('button',{class:'text-slate-400 hover:text-slate-700 p-1 rounded',onClick:onClose},h(Ic,{n:'x',s:20}))
      ),
      h('form',{onSubmit:submit,class:'p-6'},
        h('div',{class:'g2'},
          h(F,{label:'Placa',req:true},h('input',{class:'inp',value:f.placa,onInput:e=>s('placa',e.target.value),placeholder:'ABC-1234'})),
          h(F,{label:'Tipo do Veículo',req:true},
            h('select',{class:'inp',value:f.tipo,onChange:e=>onTipo(e.target.value)},
              h('option',{value:''},'Selecione…'),
              TIPOS_LIST.map(t=>h('option',{key:t,value:t},t))
            )
          ),
          h(F,{label:'Marca'},h('input',{class:'inp',value:f.marca,onInput:e=>s('marca',e.target.value),placeholder:'Volvo, Scania, Mercedes…'})),
          h(F,{label:'Modelo',req:true},h('input',{class:'inp',value:f.modelo,onInput:e=>s('modelo',e.target.value),placeholder:'FH 460, Axor 2044…'})),
          h(F,{label:'Ano'},h('input',{type:'number',class:'inp',value:f.ano,onInput:e=>s('ano',e.target.value),min:1980,max:2035})),
          h(F,{label:'KM Atual'},h('input',{type:'number',class:'inp',value:f.km_atual,onInput:e=>s('km_atual',e.target.value),min:0,placeholder:'0'})),
          h(F,{label:'Eixos'},h('input',{type:'number',class:cx('inp',info&&'hl'),value:f.eixos,onInput:e=>s('eixos',e.target.value),readOnly:!!info})),
          h(F,{label:'Pneus'},h('input',{type:'number',class:cx('inp',info&&'hl'),value:f.pneus,onInput:e=>s('pneus',e.target.value),readOnly:!!info})),
          h(F,{label:'Motorista'},h('input',{class:'inp',value:f.motorista,onInput:e=>s('motorista',e.target.value),placeholder:'Nome do motorista'})),
          h(F,{label:'Status'},
            h('select',{class:'inp',value:f.status,onChange:e=>s('status',e.target.value)},
              STATUS_CAM.map(v=>h('option',{key:v,value:v},v))
            )
          ),
          h(F,{label:'Venc. IPVA/Doc'},h('input',{type:'date',class:'inp',value:f.vencimento_ipva,onInput:e=>s('vencimento_ipva',e.target.value)})),
          h(F,{label:'Venc. Seguro'},h('input',{type:'date',class:'inp',value:f.vencimento_seguro,onInput:e=>s('vencimento_seguro',e.target.value)})),
          h(F,{label:'Calibração Tacógrafo'},h('input',{type:'date',class:'inp',value:f.data_calibracao_tacografo,onInput:e=>s('data_calibracao_tacografo',e.target.value)})),
          f.data_calibracao_tacografo?h('div',{class:'text-xs font-semibold p-2 rounded-lg col-span-2',style:'background:#f5f3ff;color:#5b21b6'},
            '⏱️ Próxima calibração: ',h('strong',null,D(addDiasData(f.data_calibracao_tacografo,TACOGRAFO_VALIDADE_DIAS))),
            '  (',N(TACOGRAFO_VALIDADE_DIAS),' dias após a última)'
          ):null,
          h(F,{label:'RENAVAM'},h('input',{class:'inp',value:f.renavam,onInput:e=>s('renavam',e.target.value),placeholder:'Opcional'})),
          h(F,{label:'Chassi'},h('input',{class:'inp',value:f.chassi,onInput:e=>s('chassi',e.target.value),placeholder:'Opcional'})),
        ),
        info?h('div',{class:'mt-3 p-3 rounded-lg text-xs font-semibold flex items-center gap-2',style:'background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0'},h(Ic,{n:'ok',s:14}),info):null,
        h('div',{class:'flex justify-end gap-3 mt-5'},
          h('button',{type:'button',class:'btn btn-ghost',onClick:onClose},'Cancelar'),
          h('button',{type:'submit',class:'btn btn-primary',disabled:busy},
            busy?h('span',{class:'spin'},h(Ic,{n:'refresh',s:14})):h(Ic,{n:editing?'ok':'plus',s:14}),
            busy?'Salvando…':editing?'Atualizar':'Cadastrar'
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════════
// MODAL — IMPORTAR FROTA (EXCEL)
// ═══════════════════════════════════════
function ModalImportFrota({onClose, onSaved, caminhoes}){
  const[step,setStep]=useState(1);
  const[fileName,setFileName]=useState('');
  const[headers,setHeaders]=useState([]);
  const[rows,setRows]=useState([]);
  const[mapping,setMapping]=useState({});
  const[busy,setBusy]=useState(false);
  const[prog,setProg]=useState({cur:0,total:0});
  const[stats,setStats]=useState(null);
  const fileRef=useRef(null);

  const existingPlacas=useMemo(function(){
    var m={};
    (caminhoes||[]).forEach(function(c){
      if(c.placa) m[normPlaca(c.placa)]=true;
    });
    return m;
  },[caminhoes]);

  const onFile=async function(file){
    if(!file) return;
    if(!window.FrotaExcel){toast('Módulo de importação não carregado','err');return;}
    setBusy(true); setStats(null);
    try{
      var data=await FrotaExcel.readFile(file);
      var map=FrotaExcel.autoDetectMapping(data.headers);
      setFileName(file.name);
      setHeaders(data.headers);
      setRows(data.rows);
      setMapping(map);
      setStep(2);
      toast(data.rows.length+' linha(s) encontrada(s)');
    }catch(e){
      toast('Erro ao ler Excel: '+e.message,'err');
    }finally{setBusy(false);}
  };

  const onDrop=function(e){
    e.preventDefault();
    var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
    if(f) onFile(f);
  };

  const doImport=async function(){
    if(!rows.length){toast('Nenhuma linha para importar','err');return;}
    if(!mapping.placa){toast('Mapeie a coluna Placa','err');return;}
    setBusy(true); setStep(3); setProg({cur:0,total:rows.length});
    try{
      var placas={...existingPlacas};
      var result=await FrotaExcel.importRows(rows, mapping, api.post.bind(api), {
        tiposVeiculo: TIPOS_VEICULO,
        existingPlacas: placas,
        onProgress: function(cur,total,s){ setProg({cur:cur,total:total}); setStats({...s}); }
      });
      setStats(result);
      if(result.ok>0){ toast(result.ok+' caminhão(ões) importado(s)!'); onSaved(); }
      else if(result.skip>0 && !result.err) toast('Nenhum registro novo — placas já existem ou linhas vazias','warn');
    }catch(e){
      toast('Erro na importação: '+e.message,'err');
    }finally{setBusy(false);}
  };

  var preview=rows.slice(0,5);
  var fields=FrotaExcel?FrotaExcel.FIELDS:[];

  return h('div',{class:'overlay',onClick:onClose},
    h('div',{class:'modal',style:'max-width:720px',onClick:function(e){e.stopPropagation();}},
      h('div',{class:'flex items-center justify-between px-6 pt-5 pb-4',style:'border-bottom:1px solid #f1f5f9'},
        h('div',null,
          h('h2',{class:'text-base font-bold',style:'color:#071A35'},'Importar Frota — Excel'),
          h('p',{class:'text-xs text-slate-400 mt-0.5'},'Planilha .xlsx / .xls / .csv · placas já cadastradas são ignoradas')
        ),
        h('button',{class:'text-slate-400 hover:text-slate-700 p-1 rounded',onClick:onClose},h(Ic,{n:'x',s:20}))
      ),
      h('div',{class:'p-6'},
        step===1?h('div',null,
          h('div',{
            class:'rounded-xl border-2 border-dashed border-slate-200 p-10 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50/50 transition',
            onClick:function(){fileRef.current&&fileRef.current.click();},
            onDragOver:function(e){e.preventDefault();},
            onDrop:onDrop
          },
            h('div',{class:'text-4xl mb-2'},'📊'),
            h('p',{class:'text-sm text-slate-600 font-semibold'},'Arraste a planilha ou clique para selecionar'),
            h('p',{class:'text-xs text-slate-400 mt-1'},'Colunas sugeridas: Placa, Tipo, Marca, Modelo, Ano, KM, Motorista…')
          ),
          h('input',{type:'file',ref:fileRef,accept:'.xlsx,.xls,.csv',style:'display:none',
            onChange:function(e){onFile(e.target.files[0]);e.target.value='';}}),
          h('p',{class:'text-xs text-slate-400 mt-4 text-center'},
            'Importação avançada: ',h('a',{href:'import.html',class:'text-blue-600 underline font-semibold'},'import.html')
          ),
          busy?h('p',{class:'text-center text-sm text-blue-600 mt-3 font-semibold'},'Lendo planilha…'):null
        ):null,
        step>=2?h('div',null,
          h('div',{class:'text-xs text-slate-500 mb-3 flex items-center gap-2'},
            h('span',{class:'badge b-blue'},fileName),
            h('span',null,rows.length+' linha(s)')
          ),
          h('p',{class:'text-xs font-semibold text-slate-600 mb-2'},'Mapeamento de colunas'),
          h('div',{class:'space-y-1 mb-4 max-h-48 overflow-y-auto'},
            fields.map(function(field){
              return h('div',{key:field.key,class:'flex items-center gap-2 text-xs'},
                h('span',{class:'w-28 font-semibold',style:'color:#2563eb'},
                  field.label, field.required?h('span',{style:'color:#ef4444'},' *'):null
                ),
                h('select',{
                  class:'inp flex-1 py-1 text-xs',
                  value:mapping[field.key]||'',
                  onChange:function(e){setMapping(function(p){var n={...p};n[field.key]=e.target.value;return n;});}
                },
                  h('option',{value:''},'— ignorar —'),
                  headers.map(function(hd){return h('option',{key:hd,value:hd},hd);})
                )
              );
            })
          ),
          preview.length?h('div',null,
            h('p',{class:'text-xs font-semibold text-slate-600 mb-1'},'Prévia (5 primeiras linhas)'),
            h('div',{class:'tbl-wrap',style:'max-height:140px'},
              h('table',null,
                h('thead',null,h('tr',null,
                  mapping.placa?h('th',null,'Placa'):null,
                  mapping.modelo?h('th',null,'Modelo'):null,
                  mapping.km_atual?h('th',null,'KM'):null,
                  mapping.motorista?h('th',null,'Motorista'):null
                )),
                h('tbody',null,preview.map(function(row,i){
                  return h('tr',{key:i},
                    mapping.placa?h('td',null,String(row[mapping.placa]||'—')):null,
                    mapping.modelo?h('td',null,String(row[mapping.modelo]||'—')):null,
                    mapping.km_atual?h('td',null,String(row[mapping.km_atual]||'—')):null,
                    mapping.motorista?h('td',null,String(row[mapping.motorista]||'—')):null
                  );
                }))
              )
            )
          ):null,
          step===3?h('div',{class:'mt-4'},
            h('div',{class:'prog-bar-wrap',style:'background:#e2e8f0;border-radius:999px;height:8px;overflow:hidden'},
              h('div',{style:'height:100%;background:#2563eb;border-radius:999px;width:'+(prog.total?Math.round(prog.cur/prog.total*100):0)+'%'})
            ),
            h('p',{class:'text-xs text-slate-500 mt-1 text-right'},prog.cur+' / '+prog.total)
          ):null,
          stats?h('div',{class:'mt-3 p-3 rounded-lg text-xs font-semibold',style:'background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d'},
            '✅ '+stats.ok+' importado(s) · '+stats.skip+' ignorado(s) · '+stats.err+' erro(s)'
          ):null,
          h('div',{class:'flex justify-between gap-3 mt-5'},
            h('button',{type:'button',class:'btn btn-ghost',onClick:function(){setStep(1);setRows([]);setStats(null);}},'← Outro arquivo'),
            h('button',{type:'button',class:'btn btn-primary',disabled:busy||!mapping.placa,onClick:doImport},
              busy?h('span',{class:'spin'},h(Ic,{n:'refresh',s:14})):h(Ic,{n:'plus',s:14}),
              busy?'Importando…':'Importar '+rows.length+' linha(s)'
            )
          )
        ):null
      )
    )
  );
}

// MODAL — MANUTENÇÃO
// Schema: caminhao_id, placa, tipo_servico, descricao, oficina,
//         valor, km, data_servico, observacoes, status, created_at
// ═══════════════════════════════════════
const BLANK_MAN={
  caminhao_id:'',placa:'',tipo_servico:'Troca de Óleo',descricao:'',
  oficina:'',valor:'',valor_mao_obra:'',valor_total:'',km:'',data_servico:hoje(),
  km_troca_oleo:'',km_proxima_oleo:'',tipo_oleo:'',filtros_trocados:'',
  pecas_utilizadas:'',numero_nf:'',local_compra:'',
  observacoes:'',status:'pendente'
};

function ModalMaint({onClose,onSaved,editing,caminhoes}){
  const[f,setF]=useState(editing?{...BLANK_MAN,...editing}:{...BLANK_MAN});
  const[busy,setBusy]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));

  const selCam=id=>{
    const c=caminhoes.find(x=>x.id===id);
    setF(p=>({...p,caminhao_id:id,placa:str(c?.placa),km:num(c?.km_atual)||''}));
  };

  const submit=async e=>{
    e.preventDefault();
    if(!f.caminhao_id){toast('Selecione um caminhão','err');return;}
    if(!parseTiposServ(f.tipo_servico).length){toast('Selecione ao menos um tipo de serviço','err');return;}
    const valorPecas=num(f.valor);
    const valorMaoObra=num(f.valor_mao_obra);
    const payload={
      caminhao_id:      str(f.caminhao_id),
      placa:            str(f.placa),
      tipo_servico:     joinTiposServ(parseTiposServ(f.tipo_servico)),
      descricao:        str(f.descricao).trim(),
      oficina:          str(f.oficina).trim(),
      valor:            valorPecas,
      valor_mao_obra:   valorMaoObra,
      valor_total:      valorPecas+valorMaoObra,
      km:               num(f.km),
      data_servico:     str(f.data_servico)||hoje(),
      km_troca_oleo:    num(f.km_troca_oleo),
      km_proxima_oleo:  num(f.km_proxima_oleo),
      tipo_oleo:        str(f.tipo_oleo).trim(),
      filtros_trocados: str(f.filtros_trocados).trim(),
      pecas_utilizadas: str(f.pecas_utilizadas).trim(),
      numero_nf:        str(f.numero_nf).trim(),
      local_compra:     str(f.local_compra).trim(),
      observacoes:      str(f.observacoes).trim(),
      status:           str(f.status)||'pendente',
      created_at:       hoje()
    };
    console.log('[ModalMaint] payload →',JSON.stringify(payload));
    setBusy(true);
    try{
      if(editing?.id){await api.put('manutencoes',editing.id,payload);toast('Manutenção atualizada!');}
      else{await api.post('manutencoes',payload);toast('Manutenção registrada!');}
      onSaved();onClose();
    }catch(err){
      console.error('[ModalMaint] ERRO:',err.message);
      toast('Erro: '+err.message,'err');
    }finally{setBusy(false);}
  };

  return h('div',{class:'overlay',onClick:onClose},
    h('div',{class:'modal',style:'max-width:720px',onClick:e=>e.stopPropagation()},
      h('div',{class:'flex items-center justify-between px-6 pt-5 pb-4',style:'border-bottom:1px solid #f1f5f9'},
        h('h2',{class:'text-base font-bold',style:'color:#071A35'},editing?'Editar Manutenção':'Nova Manutenção'),

const GSHEET_ID  = '1O0cCkF0XLg13-5gSQ7l2jrPYce1o6ytNVm-lKqYTIF8';
const GSHEET_GID = '1812787744';
const GSHEET_CSV = `https://docs.google.com/spreadsheets/d/${GSHEET_ID}/export?format=csv&gid=${GSHEET_GID}`;
// Google Forms: coluna 3 (índice 2) = QUILOMETRAGEM ATUAL (quando existir)
const GSHEET_FORMS_KM_COL = 2;

// ─── Detecta coluna "Quilometragem Atual" no CSV do Forms ─────────────────
function detectarColunaKm(rawHeaders, headers, placaIdx, tsIdx) {
  var KM_KEYWORDS = [
    'quilometragem','quilometragematu','quilometragemtual','quilometragematual',
    'quilometroatual','kmatual','kmdo','kmatu','kmdoveiculo',
    'odometro','hodometro','quilometro','hodometroatual',
    'kmrodado','quilkm','kilometragem','kilometro','hodometr','odometr'
  ];
  var i, h;

  // 1) Nome exato / parcial: "Quilometragem Atual"
  for (i = 0; i < headers.length; i++) {
    if (i === placaIdx || i === tsIdx) continue;
    h = headers[i];
    if ((h.indexOf('quilometragem') >= 0 && h.indexOf('atual') >= 0) ||
        h.indexOf('quilometragematual') >= 0 ||
        h.indexOf('quilometragematu') >= 0 ||
        h.indexOf('hodometroatual') >= 0 ||
        h.indexOf('kmatual') >= 0) {
      console.log('[Sheets] ✅ KM por nome "Quilometragem Atual" → col [' + i + ']:', rawHeaders[i]);
      return i;
    }
  }

  // 2) Qualquer coluna com "quilometragem" no cabeçalho
  for (i = 0; i < headers.length; i++) {
    if (i === placaIdx || i === tsIdx) continue;
    if (headers[i].indexOf('quilometragem') >= 0) {
      console.log('[Sheets] ✅ KM por "quilometragem" → col [' + i + ']:', rawHeaders[i]);
      return i;
    }
  }

  // 3) Palavras-chave KM
  var kmIdx = headers.findIndex(function (h, idx) {
    if (idx === placaIdx || idx === tsIdx) return false;
    return KM_KEYWORDS.some(function (kw) { return h.indexOf(kw) >= 0 || h === 'km' || h === 'kms'; });
  });
  if (kmIdx >= 0) {
    console.log('[Sheets] ✅ KM por palavra-chave → col [' + kmIdx + ']:', rawHeaders[kmIdx]);
    return kmIdx;
  }

  // 4) Coluna 3 do Forms — só se o cabeçalho confirmar quilometragem
  if (rawHeaders.length > GSHEET_FORMS_KM_COL) {
    h = headers[GSHEET_FORMS_KM_COL];
    if (h.indexOf('quilometragem') >= 0 || KM_KEYWORDS.some(function (kw) { return h.indexOf(kw) >= 0; })) {
      console.log('[Sheets] ✅ KM coluna 3 Forms → col [' + GSHEET_FORMS_KM_COL + ']:', rawHeaders[GSHEET_FORMS_KM_COL]);
      return GSHEET_FORMS_KM_COL;
    }
  }

  return -1;
}

function parseTsMs(ts) {
  if (!ts) return 0;
  var s = String(ts).trim();
  var m = s.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})(?:[\sT]+(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
  if (m) {
    return new Date(+m[3], +m[2] - 1, +m[1], +(m[4] || 0), +(m[5] || 0), +(m[6] || 0)).getTime();
  }
  var d = Date.parse(s);
  return isNaN(d) ? 0 : d;
}

function isRespostaMaisRecente(nova, atual) {
  if (!atual) return true;
  if (nova.tsMs && atual.tsMs) return nova.tsMs > atual.tsMs;
  if (nova.tsMs && !atual.tsMs) return true;
  if (!nova.tsMs && atual.tsMs) return false;
  return nova.rowIdx > atual.rowIdx;
}

// ─── Parser CSV robusto (suporta aspas, vírgula/ponto-e-vírgula, acentos) ──
function parseCSV(txt) {
  const lines = txt.trim().split(/\r?\n/);
  // Detecta separador: se a primeira linha tiver mais ';' que ',', usa ';'
  const sep = (lines[0].split(';').length > lines[0].split(',').length) ? ';' : ',';
  return lines.map(line => {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === sep && !inQ) {
        cells.push(cur.trim()); cur = '';
      } else {
        cur += ch;
      }
    }
    cells.push(cur.trim());
    return cells;
  });
}

// ─── Normaliza string para comparação (remove acentos, espaços, hifens) ───
function norm(s) {
  return String(s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[\s\-_.]/g,'');
}

// ─── JSONP Google Visualization API (funciona no browser sem CORS) ────────
function escapeCsvCell(s) {
  const v = String(s == null ? '' : s);
  return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
}

function gvizToCsvText(resp) {
  const cols = (resp.table && resp.table.cols) ? resp.table.cols : [];
  const headers = cols.map(c => c.label || '');
  const lines = [headers.map(escapeCsvCell).join(',')];
  (resp.table.rows || []).forEach(row => {
    const cells = headers.map((_, i) => {
      const cell = (row.c || [])[i];
      if (!cell) return '';
      let v = cell.f != null ? cell.f : (cell.v != null ? cell.v : '');
      if (v instanceof Date) {
        v = v.toLocaleDateString('pt-BR') + ' ' + v.toLocaleTimeString('pt-BR');
      }
      return escapeCsvCell(v);
    });
    lines.push(cells.join(','));
  });
  return lines.join('\n');
}

function fetchSheetViaGvizJsonp(sheetId, gid) {
  return new Promise((resolve, reject) => {
    const cb = '_gvizCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    let script = null;
    const cleanup = () => {
      clearTimeout(timer);
      try { delete window[cb]; } catch (_) {}
      if (script && script.parentNode) script.parentNode.removeChild(script);
    };
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout ao carregar planilha (30s)'));
    }, 30000);
    window[cb] = resp => {
      cleanup();
      if (!resp || resp.status !== 'ok' || !resp.table) {
        reject(new Error('Planilha inacessível — verifique se está pública (Qualquer pessoa com o link pode ver)'));
        return;
      }
      const txt = gvizToCsvText(resp);
      if (!txt || txt.length < 10) {
        reject(new Error('Planilha vazia ou sem permissão de leitura'));
        return;
      }
      resolve(txt);
    };
    script = document.createElement('script');
    script.src = 'https://docs.google.com/spreadsheets/d/' + sheetId + '/gviz/tq?tqx=out:json&gid=' + gid + '&callback=' + cb;
    script.onerror = () => { cleanup(); reject(new Error('Falha ao carregar planilha (JSONP)')); };
    document.head.appendChild(script);
  });
}

// ─── Fetch CSV com JSONP + proxies de fallback ───────────────────────────
async function fetchCSVcomProxy(url) {
  // 1) JSONP — método principal (sem CORS)
  if (url.includes(GSHEET_ID)) {
    try {
      const txt = await fetchSheetViaGvizJsonp(GSHEET_ID, GSHEET_GID);
      console.log('[Sheets] ✅ Carregado via JSONP (', txt.length, 'bytes)');
      return txt;
    } catch (e) {
      console.warn('[Sheets] JSONP falhou:', e.message);
    }
  }

  const urls = [
    url,
    url.replace('/export?format=csv', '/gviz/tq?tqx=out:csv'),
    'https://corsproxy.io/?' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url)
  ];

  for (let i = 0; i < urls.length; i++) {
    try {
      const r = await fetch(urls[i], { cache: 'no-store', mode: 'cors' });
      if (!r.ok) continue;
      const t = await r.text();
      if (t && t.length > 10 && !t.trim().startsWith('<!DOCTYPE')) {
        console.log('[Sheets] ✅ Carregado via fetch #' + (i + 1));
        return t;
      }
    } catch (e) {
      console.log('[Sheets] Fetch #' + (i + 1) + ' falhou:', e.message);
    }
  }

  throw new Error('Não foi possível acessar a planilha. Confirme que ela está pública: Compartilhar → Qualquer pessoa com o link → Leitor.');
}

// ─── Extrai mapa placa→km de um texto CSV ─────────────────────────────────
function extrairKmDoCSV(txt) {
  const rows = parseCSV(txt);
  if (rows.length < 1) return { map: {}, totalLinhas: 0, headers: [], placaIdx: -1, kmIdx: -1, status: 'CSV vazio' };

  const rawHeaders = rows[0];
  const headers    = rawHeaders.map(h => norm(h));
  console.log('[Sheets] Cabeçalhos RAW:', rawHeaders);
  console.log('[Sheets] Cabeçalhos normalizados:', headers);
  console.log('[Sheets] Total de linhas (com header):', rows.length);

  // ── Detecção PLACA ──
  const placaIdx = detectarColPlaca(headers, rows);

  // ── Detecção timestamp ──
  const tsIdx = headers.findIndex(h =>
    h.includes('timestamp') || h.includes('carimbo') ||
    h.includes('datahora') || (h.includes('data') && !h.includes('cadastro'))
  );

  // ── Detecção KM — busca "Quilometragem Atual" por nome ──
  let kmIdx = detectarColunaKm(rawHeaders, headers, placaIdx, tsIdx);

  console.log('[Sheets] placaIdx='+placaIdx+' → '+(rawHeaders[placaIdx]||'N/A'));
  console.log('[Sheets] kmIdx='+kmIdx+' → '+(rawHeaders[kmIdx]||'N/A'));
  console.log('[Sheets] tsIdx='+tsIdx+' → '+(rawHeaders[tsIdx]||'N/A'));

  if (placaIdx < 0) {
    return { map: {}, totalLinhas: rows.length, headers: rawHeaders, placaIdx, kmIdx, status: 'PLACA_NAO_ENCONTRADA' };
  }

  // ── Fallback: heurística numérica (coluna com valores > 500) ──
  if (kmIdx < 0 && rows.length >= 2) {
    for (let col = 0; col < headers.length; col++) {
      if (col === placaIdx || col === tsIdx) continue;
      const vals = rows.slice(1, Math.min(8, rows.length))
        .map(row => {
          const raw = (row[col]||'').trim().replace(/\./g,'').replace(',','.').replace(/[^\d.]/g,'');
          return parseFloat(raw);
        });
      const numericVals = vals.filter(v => !isNaN(v) && v > 500 && v < 9999999);
      if (numericVals.length > 0) {
        kmIdx = col;
        console.log('[Sheets] ✅ KM detectado por heurística numérica na coluna ['+col+']:', rawHeaders[col]);
        break;
      }
    }
  }

  if (kmIdx < 0) {
    console.warn('[Sheets] ❌ Coluna "Quilometragem Atual" não encontrada. Cabeçalhos:', rawHeaders);
    return { map: {}, totalLinhas: rows.length, headers: rawHeaders, placaIdx, kmIdx: -1, status: 'KM_NAO_ENCONTRADA' };
  }

  console.log('[Sheets] ✅ Usando KM da coluna ['+kmIdx+'] (coluna '+(kmIdx+1)+' da planilha):', rawHeaders[kmIdx]);
  console.log('[Sheets] ℹ️ Regra: por placa, usa apenas a quilometragem da resposta MAIS RECENTE do Forms');

  // ── Parse todas as linhas — mantém só a resposta mais recente por placa ──
  const map = {};
  let linhasValidas = 0;
  let linhasComFoto = 0;
  let linhasComPlacaInvalida = 0;
  rows.slice(1).forEach((row, rowIdx) => {
    if (!row || row.length < Math.max(placaIdx, kmIdx) + 1) return;

    const placaRaw = (row[placaIdx]||'').trim();
    // Ignora linhas onde o campo "placa" é uma URL (pergunta errada)
    if (placaRaw.toLowerCase().startsWith('http')) { linhasComPlacaInvalida++; return; }

    const placa = placaRaw.toUpperCase().replace(/[\s\-_.]/g,'');
    if (!isPlacaBR(placa)) { linhasComPlacaInvalida++; return; }

    const kmValRaw = (row[kmIdx]||'').trim();
    // Ignora se KM é uma URL (pergunta configurada como foto do hodômetro)
    if (kmValRaw.toLowerCase().startsWith('http')) { linhasComFoto++; return; }

    const kmRaw = kmValRaw
      .replace(/\./g,'')        // remove pontos de milhar: 150.000 → 150000
      .replace(',','.')         // vírgula decimal → ponto
      .replace(/[^\d.]/g,'');   // remove qualquer outro char
    const km = parseFloat(kmRaw);
    const ts = tsIdx >= 0 ? (row[tsIdx]||'') : '';
    const tsMs = parseTsMs(ts);

    // KM mínimo de 10 km e máximo de 9.999.999 km (sanity check)
    if (!isNaN(km) && km >= 10 && km < 9999999) {
      linhasValidas++;
      var candidato = { placa: placa, km: km, ts: ts, tsMs: tsMs, rowIdx: rowIdx };
      if (isRespostaMaisRecente(candidato, map[placa])) {
        map[placa] = candidato;
        console.log('[Sheets] 🚛', placa, '→ KM:', km, ts ? ('(ts: '+ts+')') : '(linha '+rowIdx+')');
      }
    }
  });

  if (linhasComFoto > 0) {
    console.warn('[Sheets] ⚠️ '+linhasComFoto+' linha(s) com FOTO no campo KM (pergunta configurada como upload de imagem)');
  }
  if (linhasComPlacaInvalida > 0) {
    console.log('[Sheets] ℹ️ '+linhasComPlacaInvalida+' linha(s) com placa inválida/URL ignoradas');
  }
  console.log('[Sheets] ✅ Total placas com KM:', Object.keys(map).length, '| linhas válidas:', linhasValidas);
  return { map, totalLinhas: rows.length, headers: rawHeaders, placaIdx, kmIdx, tsIdx, status: 'OK', linhasComFoto };
}

// ─── Fetch e parse da planilha Google Forms ───────────────────────────────
async function fetchKmFromSheets() {
  try {
    const txt = await fetchCSVcomProxy(GSHEET_CSV);
    const result = extrairKmDoCSV(txt);
    const { map, totalLinhas, headers, placaIdx, kmIdx, status, linhasComFoto = 0 } = result;

    if (status === 'CSV vazio') {
      console.warn('[Sheets] CSV vazio — planilha sem dados');
      return { data: [], status, headers: [], totalLinhas: 0, linhasComFoto: 0 };
    }
    if (status === 'PLACA_NAO_ENCONTRADA') {
      console.warn('[Sheets] ❌ Coluna PLACA não encontrada! Colunas disponíveis:', headers);
      return { data: [], status, headers, totalLinhas, linhasComFoto: 0 };
    }
    if (status === 'KM_NAO_ENCONTRADA') {
      console.warn('[Sheets] ❌ Coluna KM não encontrada! Colunas disponíveis:', headers,
        '\n→ Verifique se a pergunta "Quilometragem Atual" já tem respostas na planilha.');
      return { data: [], status, headers, totalLinhas, linhasComFoto: 0 };
    }

    return { data: Object.values(map), status: 'OK', headers, totalLinhas, kmIdx, placaIdx, linhasComFoto };

  } catch(e) {
    console.warn('[Sheets] Erro fatal:', e.message);
    return { data: [], status: 'ERRO: ' + e.message, headers: [], totalLinhas: 0, linhasComFoto: 0 };
  }
}

// ─── Detecta índice de coluna pelo cabeçalho normalizado ─────────────────
function findColIdx(headers, patterns) {
  for (let i = 0; i < headers.length; i++) {
    const h = headers[i];
    if (patterns.some(p => h.includes(p))) return i;
  }
  return -1;
}

function normFormsVal(v) {
  return String(v || '').trim().toUpperCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function tsToDateStr(ts) {
  const ms = parseTsMs(ts);
  if (!ms) return hoje();
  return new Date(ms).toISOString().slice(0, 10);
}

function calcStatusGeralForms(c) {
  const sim = v => normFormsVal(v).startsWith('SIM');
  const sujo = v => normFormsVal(v).includes('SUJO');
  if (sim(c.existem_avarias) || sim(c.existem_lampadas) || sim(c.existem_falhas)) return 'critico';
  if (sujo(c.limpeza_externa) || sujo(c.limpeza_interna)) return 'atencao';
  return 'ok';
}

// ─── Extrai checklists completos do CSV do Google Forms ───────────────────
function extrairChecklistsDoCSV(txt) {
  const rows = parseCSV(txt);
  if (rows.length < 2) return { rows: [], totalLinhas: rows.length, headers: rows[0] || [], status: 'CSV vazio' };

  const rawHeaders = rows[0];
  const headers = rawHeaders.map(h => norm(h));
  const placaIdx = detectarColPlaca(headers, rows);
  const tsIdx = findColIdx(headers, ['carimbo', 'timestamp', 'datahora']);
  const kmIdx = findColIdx(headers, ['quilometragem', 'km']);
  const avariasIdx = findColIdx(headers, ['avaria']);
  const lampadasIdx = findColIdx(headers, ['lampada']);
  const falhasIdx = findColIdx(headers, ['falha']);
  const limpExtIdx = findColIdx(headers, ['externo']);
  const limpIntIdx = findColIdx(headers, ['interno']);
  const obsIdx = findColIdx(headers, ['observ']);
  const evidIdx = findColIdx(headers, ['evidenc']);
  const motoristaIdx = findColIdx(headers, ['motorista', 'nome do motorista', 'nome']);

  if (placaIdx < 0) {
    return { rows: [], totalLinhas: rows.length, headers: rawHeaders, status: 'PLACA_NAO_ENCONTRADA' };
  }

  const out = [];
  rows.slice(1).forEach((row, rowIdx) => {
    if (!row || row.length <= placaIdx) return;
    const placaRaw = (row[placaIdx] || '').trim();
    if (placaRaw.toLowerCase().startsWith('http')) return;
    const placa = placaRaw.toUpperCase().replace(/[\s\-_.]/g, '');
    if (!isPlacaBR(placa)) return;

    const ts = tsIdx >= 0 ? (row[tsIdx] || '') : '';
    const tsMs = parseTsMs(ts);
    let km = 0;
    if (kmIdx >= 0) {
      const kmRaw = (row[kmIdx] || '').trim();
      if (kmRaw && !kmRaw.toLowerCase().startsWith('http')) {
        km = parseFloat(kmRaw.replace(/\./g, '').replace(',', '.').replace(/[^\d.]/g, '')) || 0;
      }
    }

    const entry = {
      placa,
      km_atual: km,
      motorista: motoristaIdx >= 0 ? str(row[motoristaIdx]).trim() : '',
      existem_avarias: avariasIdx >= 0 ? normFormsVal(row[avariasIdx]) : '',
      existem_lampadas: lampadasIdx >= 0 ? normFormsVal(row[lampadasIdx]) : '',
      existem_falhas: falhasIdx >= 0 ? normFormsVal(row[falhasIdx]) : '',
      limpeza_externa: limpExtIdx >= 0 ? normFormsVal(row[limpExtIdx]) : '',
      limpeza_interna: limpIntIdx >= 0 ? normFormsVal(row[limpIntIdx]) : '',
      observacoes: obsIdx >= 0 ? str(row[obsIdx]).trim() : '',
      evidencias: evidIdx >= 0 ? str(row[evidIdx]).trim() : '',
      data_checklist: tsToDateStr(ts),
      ts,
      tsMs,
      sheet_key: normPlaca(placa) + '|' + (tsMs || rowIdx),
      rowIdx
    };
    entry.status_geral = calcStatusGeralForms(entry);
    out.push(entry);
  });

  out.sort((a, b) => (b.tsMs || b.rowIdx) - (a.tsMs || a.rowIdx));
  return { rows: out, totalLinhas: rows.length, headers: rawHeaders, status: 'OK' };
}

async function fetchChecklistsFromSheets() {
  try {
    const txt = await fetchCSVcomProxy(GSHEET_CSV);
    const result = extrairChecklistsDoCSV(txt);
    if (result.status === 'CSV vazio') {
      return { data: [], status: result.status, headers: result.headers || [], totalLinhas: result.totalLinhas || 0 };
    }
    if (result.status === 'PLACA_NAO_ENCONTRADA') {
      return { data: [], status: result.status, headers: result.headers, totalLinhas: result.totalLinhas };
    }
    return { data: result.rows, status: 'OK', headers: result.headers, totalLinhas: result.totalLinhas };
  } catch (e) {
    return { data: [], status: 'ERRO: ' + e.message, headers: [], totalLinhas: 0 };
  }
}

async function syncChecklistsAoFirestore(caminhoes, sheetRows, existing) {
  if (!sheetRows || sheetRows.length === 0) return { importados: 0, ignorados: 0, erros: 0 };
  const existingKeys = new Set(
    existing.map(c => c.sheet_key || (normPlaca(c.placa) + '|' + parseTsMs(c.data_checklist))).filter(Boolean)
  );
  let importados = 0, ignorados = 0, erros = 0;
  for (const row of sheetRows) {
    if (!isPlacaBR(row.placa) && !findCaminhaoByPlaca(caminhoes, row.placa)) continue;
    if (existingKeys.has(row.sheet_key)) { ignorados++; continue; }
    const match = findCaminhaoByPlaca(caminhoes, row.placa);
    const payload = {
      caminhao_id: match ? match.cam.id : '',
      placa: match ? match.cam.placa : row.placa,
      motorista: row.motorista || (match ? match.cam.motorista : ''),
      km_atual: row.km_atual,
      existem_avarias: row.existem_avarias,
      existem_lampadas: row.existem_lampadas,
      existem_falhas: row.existem_falhas,
      limpeza_externa: row.limpeza_externa,
      limpeza_interna: row.limpeza_interna,
      observacoes: row.observacoes,
      evidencias: row.evidencias,
      status_geral: row.status_geral,
      data_checklist: row.data_checklist,
      sheet_key: row.sheet_key,
      created_at: row.data_checklist || hoje()
    };
    try {
      await api.post('checklists', payload);
      importados++;
      existingKeys.add(row.sheet_key);
    } catch (e) {
      erros++;
      console.warn('[SyncChecklist] Erro:', row.placa, e.message);
    }
  }
  return { importados, ignorados, erros };
}

// ─── Normaliza placa para matching ────────────────────────────────────────
// Remove tudo que não é letra/número e converte para maiúsculo
function normPlaca(s) {
  return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
}

function isPlacaBR(s) {
  const p = normPlaca(s);
  if (p.length !== 7) return false;
  return /^[A-Z]{3}[0-9][A-Z0-9][0-9]{2}$/.test(p) || /^[A-Z]{3}[0-9]{4}$/.test(p);
}

function addMeses(dateStr, meses) {
  try {
    const d = new Date(String(dateStr).slice(0, 10) + 'T12:00:00');
    d.setMonth(d.getMonth() + meses);
    return d.toISOString().slice(0, 10);
  } catch (e) { return hoje(); }
}

function detectarColPlaca(headers, rows) {
  for (let i = 0; i < headers.length; i++) {
    const h = headers[i];
    if (h.includes('placa') && !h.includes('avaria') && !h.includes('observ') && !h.includes('foto')) return i;
  }
  for (let i = 0; i < headers.length; i++) {
    if ((headers[i].includes('veiculo') || headers[i].includes('caminhao')) && !headers[i].includes('km')) return i;
  }
  let best = -1, bestScore = 0;
  for (let col = 0; col < headers.length; col++) {
    const score = rows.slice(1, Math.min(25, rows.length))
      .filter(r => isPlacaBR((r[col] || '').trim())).length;
    if (score > bestScore) { bestScore = score; best = col; }
  }
  if (bestScore >= 1) return best;
  return headers.findIndex(h => h.includes('placa') || h.includes('veiculo') || h === 'plate');
}

function placaChecklistValida(placa, caminhoes) {
  return isPlacaBR(placa) || !!findCaminhaoByPlaca(caminhoes || [], placa);
}

function motoristaChecklist(c, caminhoes) {
  if (c.motorista && String(c.motorista).trim()) return String(c.motorista).trim();
  const m = findCaminhaoByPlaca(caminhoes || [], c.placa);
  return m && m.cam.motorista ? m.cam.motorista : '—';
}

function filterChecklistsValidos(list, caminhoes) {
  return (list || []).filter(c => placaChecklistValida(c.placa, caminhoes));
}

// ─── Matching fuzzy de placa (confusão O/0, I/1, l/1, S/5, F/E etc.) ─────
function normPlacaFuzzy(s) {
  return normPlaca(s)
    .replace(/O/g,'0')   // O → 0
    .replace(/I/g,'1')   // I → 1
    .replace(/L/g,'1')   // L → 1 (maiúsculo)
    .replace(/S/g,'5')   // S → 5
    .replace(/F/g,'5') ; // F → 5 (confusão em placas antigas)
}

// Calcula distância de edição simples (Levenshtein)
function levenshtein(a, b) {
  if (a === b) return 0;
  const la = a.length, lb = b.length;
  if (la === 0) return lb; if (lb === 0) return la;
  const dp = Array.from({length: lb+1}, (_,i) => i);
  for (let i = 1; i <= la; i++) {
    let prev = i;
    for (let j = 1; j <= lb; j++) {
      const cost = a[i-1] === b[j-1] ? 0 : 1;
      const curr = Math.min(prev+1, dp[j]+1, dp[j-1]+cost);
      dp[j-1] = prev; prev = curr;
    }
    dp[lb] = prev;
  }
  return dp[lb];
}

// Encontra caminhão por placa com matching exato, fuzzy ou por distância
function findCaminhaoByPlaca(caminhoes, placa) {
  const norm = normPlaca(placa);
  // 1. Exato normalizado
  let cam = caminhoes.find(c => normPlaca(c.placa) === norm);
  if (cam) return { cam, metodo: 'exato' };
  // 2. Fuzzy (troca O↔0, I↔1, S↔5, F↔5)
  const fuzzy = normPlacaFuzzy(placa);
  cam = caminhoes.find(c => normPlacaFuzzy(c.placa) === fuzzy);
  if (cam) return { cam, metodo: 'fuzzy' };
  // 3. Primeiros 3 chars + últimos 2 chars + mesmo tamanho (1 char errado no meio)
  const pref3 = norm.slice(0, 3);
  const suf2  = norm.slice(-2);
  cam = caminhoes.find(c => {
    const cn = normPlaca(c.placa);
    return cn.length === norm.length && cn.slice(0,3) === pref3 && cn.slice(-2) === suf2;
  });
  if (cam) return { cam, metodo: 'parcial' };
  // 4. Levenshtein distância ≤ 2 (para anagramas e trocas simples como TUA↔TAU)
  if (norm.length >= 6) {
    const candidates = caminhoes
      .map(c => ({ c, d: levenshtein(norm, normPlaca(c.placa)), cf: levenshtein(fuzzy, normPlacaFuzzy(c.placa)) }))
      .filter(x => x.d <= 2 || x.cf <= 2)
      .sort((a,b) => Math.min(a.d,a.cf) - Math.min(b.d,b.cf));
    if (candidates.length > 0) return { cam: candidates[0].c, metodo: 'similaridade' };
  }
  return null;
}

// ─── Sincroniza km_atual no cadastro via PATCH ────────────────────────────
// Chama após fetchKmFromSheets() ter retornado dados
async function syncKmAoCadastro(caminhoes, kmSheets) {
  if (!kmSheets || kmSheets.length === 0) return { atualizados: 0, erros: 0 };

  // Log das placas do cadastro para debug
  console.log('[SyncKM] Placas no cadastro:', caminhoes.map(c=>normPlaca(c.placa)).join(', '));
  console.log('[SyncKM] Placas na planilha:', kmSheets.map(e=>e.placa).join(', '));

  let atualizados = 0, erros = 0;
  for (const entry of kmSheets) {
    // Matching com fallback fuzzy (confusão O/0, I/1, S/5, F/5 etc.)
    const match = findCaminhaoByPlaca(caminhoes, entry.placa);
    if (!match) {
      const placaNorm = normPlaca(entry.placa);
      console.log('[SyncKM] ❓ Placa "'+entry.placa+'" não encontrada (nem fuzzy). Mais próxima:',
        caminhoes.map(c=>normPlaca(c.placa)).find(p=>p.startsWith(placaNorm.slice(0,4)))||'nenhuma');
      continue;
    }
    const { cam, metodo } = match;
    if (metodo !== 'exato') {
      console.log('[SyncKM] 🔀 Match '+metodo+': "'+entry.placa+'" → "'+cam.placa+'"');
    }
    // Só atualiza se o KM da planilha for MAIOR que o cadastro (evita regressão)
    if (entry.km <= num(cam.km_atual)) {
      console.log('[SyncKM] ⏩ '+cam.placa+': KM planilha ('+entry.km+') <= cadastro ('+cam.km_atual+'), sem atualização');
      continue;
    }
    try {
      await api.patch('caminhoes', cam.id, { km_atual: entry.km });
      atualizados++;
      console.log('[SyncKM] ✅ Atualizado', cam.placa, ':', cam.km_atual, '→', entry.km);
    } catch(e) {
      erros++;
      console.warn('[SyncKM] ❌ Erro ao atualizar', cam.placa, ':', e.message);
    }
  }
  console.log('[SyncKM] Resultado: '+atualizados+' atualizados, '+erros+' erros');
  return { atualizados, erros };
}

// ═══════════════════════════════════════
// WIDGET — DASHBOARD DE ÓLEO
// ═══════════════════════════════════════
function OleoDashboard({caminhoes, manutencoes, onKmSync}) {
  const [kmSheets, setKmSheets]       = useState([]);
  const [sheetsLoading, setSheetsLoading] = useState(false);
  const [sheetsErr, setSheetsErr]     = useState('');
  const [lastSync, setLastSync]       = useState('');
  const [syncInfo, setSyncInfo]       = useState(''); // resultado do sync com cadastro

  const syncSheets = useCallback(async () => {
    setSheetsLoading(true); setSheetsErr(''); setSyncInfo('');
    const result = await fetchKmFromSheets();
    const data = result.data || [];
    const sheetStatus = result.status || '';
    const sheetHeaders = result.headers || [];
    const linhasComFoto = result.linhasComFoto || 0;

    if (data.length === 0) {
      // Mensagem de erro específica por tipo de falha
      if (sheetStatus === 'PLACA_NAO_ENCONTRADA') {
        setSheetsErr(`❌ Coluna PLACA não encontrada na planilha! Colunas encontradas: [${sheetHeaders.join(', ')}]. Verifique se a pergunta da placa está publicada no Forms.`);
      } else if (sheetStatus === 'KM_NAO_ENCONTRADA') {
        const colunas = sheetHeaders.length > 0 ? `Colunas encontradas: [${sheetHeaders.join(', ')}]. ` : '';
        setSheetsErr(`⚠️ ${colunas}A coluna "Quilometragem Atual" ainda NÃO existe na planilha do Forms (só aparecem Carimbo e Placa). SOLUÇÃO: 1) Abra o Google Forms → adicione a pergunta "Quilometragem Atual" (tipo Número ou Resposta curta) → 2) Envie UMA resposta de teste com KM preenchido → 3) Clique em Sync KM novamente. O sistema procura automaticamente por "Quilometragem Atual" no cabeçalho.`);
      } else if (sheetStatus.startsWith('ERRO')) {
        setSheetsErr(`❌ Erro ao acessar planilha: ${sheetStatus}. Verifique se a planilha está pública (Compartilhar → Qualquer pessoa com o link pode ver).`);
      } else {
        setSheetsErr('Planilha sem dados de KM. Verifique se: 1) A pergunta "Quilometragem Atual" existe no Forms, 2) já existe ao menos UMA resposta com KM preenchido, 3) a planilha está pública.');
      }
    } else {
      // ── Aviso sobre fotos no campo KM ─────────────────────────────────
      if (linhasComFoto > 0) {
        setSheetsErr(`⚠️ ${linhasComFoto} resposta(s) com FOTO no campo KM ignoradas (o Forms está configurado para upload de imagem nesse campo). Mude a pergunta "Quilometragem Atual" para tipo "Número" ou "Resposta curta" no Forms.`);
      }
      // ── Sincroniza km_atual no banco de dados ──────────────────────────
      const { atualizados, erros } = await syncKmAoCadastro(caminhoes, data);
      if (atualizados > 0) {
        setSyncInfo(`✅ ${atualizados} veículo${atualizados>1?'s':''} com KM atualizado no sistema! (${data.length} placa${data.length>1?'s':''} lidas da planilha)`);
        if (onKmSync) onKmSync(); // recarrega caminhoes no App
      } else {
        setSyncInfo(`📊 ${data.length} placa${data.length>1?'s':''} lida${data.length>1?'s':''} da planilha — KMs já estão atualizados, maiores no sistema, ou placas não encontradas no cadastro.`);
      }
      if (erros > 0) setSyncInfo(prev => prev + ` (${erros} erro${erros>1?'s':''})`);
    }

    setKmSheets(data);
    setLastSync(new Date().toLocaleTimeString('pt-BR'));
    setSheetsLoading(false);
  }, [caminhoes]);

  // Só roda o sync automático QUANDO os caminhões estiverem carregados
  // Evita race condition: primeiro render tem caminhoes=[], não faz sentido sincronizar
  const sincronizadoRef = useRef(false);
  useEffect(() => {
    if (caminhoes.length > 0 && !sincronizadoRef.current) {
      sincronizadoRef.current = true;
      syncSheets();
    }
  }, [caminhoes.length]); // eslint-disable-line

  const oleoPorCam = useMemo(() => {
    return caminhoes.map(c => {
      const trocas = manutencoes
        .filter(m => m.placa === c.placa && num(m.km_troca_oleo) > 0)
        .sort((a,b) => num(b.km_troca_oleo) - num(a.km_troca_oleo));
      const ultima      = trocas[0] || null;
      const kmTroca     = ultima ? num(ultima.km_troca_oleo)    : 0;
      const kmProxima   = ultima ? num(ultima.km_proxima_oleo)  : 0;
      const tipoOleo    = ultima ? str(ultima.tipo_oleo)        : '';
      const filtros     = ultima ? str(ultima.filtros_trocados) : '';

      const sheetEntry = kmSheets.find(s =>
        normPlaca(s.placa) === normPlaca(c.placa)
      );
      const kmAtual    = sheetEntry ? sheetEntry.km : num(c.km_atual);
      const kmAtualSrc = sheetEntry ? '📊 Planilha' : '🖥️ Cadastro';

      const falta   = kmProxima > 0 ? kmProxima - kmAtual : null;
      const rodados = kmTroca   > 0 ? kmAtual - kmTroca   : null;
      let urgencia = ultima ? 'ok' : 'sem-dados';
      if (ultima && falta !== null) {
        if      (falta <= 0)    urgencia = 'critico';
        else if (falta <= 3000) urgencia = 'atencao';
        else                    urgencia = 'ok';
      }

      return { c, kmAtual, kmAtualSrc, kmTroca, kmProxima, tipoOleo, filtros,
               falta, rodados, urgencia, dataServico: ultima?.data_servico||'', ts: sheetEntry?.ts||'' };
    });
  }, [caminhoes, manutencoes, kmSheets]);

  const counts = useMemo(() => ({
    critico:  oleoPorCam.filter(o => o.urgencia==='critico').length,
    atencao:  oleoPorCam.filter(o => o.urgencia==='atencao').length,
    ok:       oleoPorCam.filter(o => o.urgencia==='ok').length,
    semDados: oleoPorCam.filter(o => o.urgencia==='sem-dados').length,
  }), [oleoPorCam]);

  const urgColors = {
    ok:         { bg:'#f0fdf4', border:'#bbf7d0', dot:'#22c55e', txt:'#15803d', label:'Em dia'      },
    atencao:    { bg:'#fffbeb', border:'#fde68a', dot:'#f59e0b', txt:'#92400e', label:'Atenção'     },
    critico:    { bg:'#fef2f2', border:'#fecaca', dot:'#ef4444', txt:'#dc2626', label:'Vencida!'     },
    'sem-dados':{ bg:'#f8fafc', border:'#e2e8f0', dot:'#94a3b8', txt:'#64748b', label:'Sem registro' }
  };

  return h('div',{class:'card'},
    h('div',{class:'flex items-center justify-between mb-4'},
      h('div',{class:'flex items-center gap-2'},
        h('span',{class:'text-xl'},'🛢️'),
        h('div',null,
          h('h3',{class:'font-bold text-sm',style:'color:#071A35'},'Dashboard — Troca de Óleo do Motor'),
          h('p',{class:'text-xs text-slate-400'},
            lastSync ? 'Última atualização: '+lastSync+' (KM via Google Forms)' : 'Sincronizando planilha…'
          ),
          h('p',{class:'text-xs mt-0.5',style:'color:#64748b'},
            '📋 Forms: coluna 3 = Quilometragem Atual · usa apenas o KM da resposta mais recente por placa'
          )
        )
      ),
        h('button',{
        class:cx('btn btn-sm flex items-center gap-1',sheetsLoading?'opacity-60 btn-ghost':'btn-primary'),
        onClick:syncSheets, disabled:sheetsLoading,
        title:'Busca KM no Google Forms e atualiza o cadastro automaticamente'
      },
        h('span',{class:sheetsLoading?'spin':''},'📊'),
        sheetsLoading?'Sincronizando…':'🔄 Sync KM do Forms'
      )
    ),
    // Resultado do último sync
    syncInfo?h('div',{class:'text-xs p-2 rounded-lg mb-3 font-semibold',
      style:'background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d'},syncInfo):null,
    h('div',{class:'grid grid-cols-4 gap-3 mb-4'},
      [['critico','Vencida','#ef4444'],['atencao','Atenção','#f59e0b'],['ok','Em dia','#22c55e'],['semDados','Sem registro','#94a3b8']]
        .map(function(item){var k=item[0],lbl=item[1],c=item[2];return h('div',{key:k,class:'rounded-xl p-3 text-center',style:'background:'+c+'18;border:1px solid '+c+'44'},
          h('div',{class:'text-2xl font-extrabold',style:'color:'+c},counts[k]||0),
          h('div',{class:'text-xs font-semibold mt-0.5',style:'color:'+c},lbl)
        );})
    ),
    sheetsErr?h('div',{class:'text-xs p-3 rounded-lg mb-3 flex items-start gap-2',style:'background:#fffbeb;border:1px solid #fde68a;color:#92400e'},
      '⚠️ ',h('span',null,sheetsErr,' ',
        h('a',{href:'https://docs.google.com/spreadsheets/d/'+GSHEET_ID+'/edit',target:'_blank',class:'underline font-semibold ml-1'},'Abrir planilha →')
      )
    ):null,
    h('div',{class:'space-y-2'},
      oleoPorCam.length===0
        ? h('p',{class:'text-sm text-slate-400 text-center py-6'},'Nenhum veículo cadastrado.')
        : oleoPorCam.map(o => {
            const col = urgColors[o.urgencia];
            const intervalo = o.kmProxima > o.kmTroca ? o.kmProxima - o.kmTroca : 0;
            const pct = (intervalo > 0 && o.kmAtual >= o.kmTroca)
              ? Math.min(100, Math.round(((o.kmAtual - o.kmTroca) / intervalo) * 100))
              : 0;
            const barColor = o.urgencia==='critico'?'#ef4444':o.urgencia==='atencao'?'#f59e0b':'#22c55e';
            return h('div',{key:o.c.id,
              class:'rounded-xl p-4',
              style:'background:'+col.bg+';border:1.5px solid '+col.border
            },
              h('div',{class:'flex items-center justify-between mb-2'},
                h('div',{class:'flex items-center gap-2'},
                  h('span',{class:'font-mono font-extrabold text-sm px-2 py-0.5 rounded',style:'background:#eff6ff;color:#071A35'},o.c.placa||'—'),
                  h('span',{class:'text-xs text-slate-500'},o.c.modelo||''),
                  o.c.motorista?h('span',{class:'text-xs text-slate-400'},'· '+o.c.motorista):null
                ),
                h('div',{class:'flex items-center gap-2'},
                  h('span',{class:'badge',style:'background:'+col.dot+'22;color:'+col.txt},
                    o.urgencia==='critico'?'🔴 ':o.urgencia==='atencao'?'🟡 ':o.urgencia==='ok'?'🟢 ':'⚪ ',
                    col.label
                  ),
                  h('span',{class:'text-xs',style:'color:#94a3b8'},o.kmAtualSrc)
                )
              ),
              h('div',{class:'grid grid-cols-2 lg:grid-cols-4 gap-2 mb-3'},
                h('div',{class:'text-xs'},h('div',{class:'text-slate-400',style:'font-size:.65rem'},'KM ATUAL'),h('div',{class:'font-bold text-sm'},N(o.kmAtual)+' km')),
                h('div',{class:'text-xs'},h('div',{class:'text-slate-400',style:'font-size:.65rem'},'KM DA TROCA'),h('div',{class:'font-bold text-sm'},o.kmTroca>0?N(o.kmTroca)+' km':'—')),
                h('div',{class:'text-xs'},h('div',{class:'text-slate-400',style:'font-size:.65rem'},'PRÓXIMA TROCA'),h('div',{class:'font-bold text-sm',style:'color:'+col.txt},o.kmProxima>0?N(o.kmProxima)+' km':'—')),
                h('div',{class:'text-xs'},h('div',{class:'text-slate-400',style:'font-size:.65rem'},'FALTAM'),
                  h('div',{class:'font-extrabold',style:'font-size:1.05rem;color:'+col.txt},
                    o.falta===null ? '—' : o.falta<=0 ? '⚠️ '+N(Math.abs(o.falta))+' km vencido' : N(o.falta)+' km'
                  )
                )
              ),
              o.urgencia!=='sem-dados' ? h('div',{class:'mb-2'},
                h('div',{class:'flex justify-between text-xs text-slate-400 mb-1'},
                  h('span',null,'Rodado: '+N(o.rodados||0)+' km'),
                  h('span',null,pct+'% do intervalo')
                ),
                h('div',{class:'pbar'},h('div',{class:'pfill',style:'width:'+pct+'%;background:'+barColor}))
              ) : null,
              (o.tipoOleo||o.filtros||o.dataServico) ? h('div',{class:'flex flex-wrap gap-3 text-xs',style:'color:#64748b'},
                o.tipoOleo ? h('span',null,'🛢️ ',h('strong',null,o.tipoOleo)) : null,
                o.filtros ? h('span',null,'🔧 Filtros: ',h('strong',null,o.filtros)) : null,
                o.dataServico ? h('span',null,'📅 Última troca: ',h('strong',null,D(o.dataServico))) : null,
                o.ts ? h('span',{style:'color:#94a3b8'},'📊 Forms: '+o.ts) : null
              ) : null
            );
          })
    )
  );
}

// PAGE — DASHBOARD
// ═══════════════════════════════════════
function PageDash({caminhoes,manutencoes,pneus,checklists,alertas,goTo,onOk}){
  const totalCusto=manutencoes.reduce((s,m)=>s+custoManutencao(m),0);
  const crits=alertas.filter(a=>a.lvl==='critical').length;
  const alertasOleo=useMemo(()=>gerarAlertasOleo(caminhoes,manutencoes,[]),[caminhoes,manutencoes]);
  const alertasTacografo=useMemo(()=>gerarAlertasTacografo(caminhoes),[caminhoes]);

  const monthData=useMemo(()=>{
    const now=new Date();
    return Array.from({length:6},(_,i)=>{
      const d=new Date(now.getFullYear(),now.getMonth()-5+i,1);
      const lbl=d.toLocaleDateString('pt-BR',{month:'short',year:'2-digit'});
      const val=manutencoes.filter(m=>{
        if(!m.data_servico)return false;
        try{const md=new Date(m.data_servico+'T12:00:00');return md.getMonth()===d.getMonth()&&md.getFullYear()===d.getFullYear();}
        catch{return false;}
      }).reduce((s,m)=>s+custoManutencao(m),0);
      return{lbl,val};
    });
  },[manutencoes]);

  const custoPorCam=useMemo(()=>{
    const map={};
    manutencoes.forEach(m=>{if(m.placa)map[m.placa]=(map[m.placa]||0)+custoManutencao(m);});
    return Object.keys(map).map(function(pl){return{pl:pl,v:map[pl]};}).sort(function(a,b){return b.v-a.v;}).slice(0,6);
  },[manutencoes]);

  // Últimas manutenções ordenadas por data
  const ultimasManut=useMemo(()=>
    [...manutencoes]
      .sort((a,b)=>{
        const da=a.data_servico||'';const db=b.data_servico||'';
        if(db!==da)return db.localeCompare(da);
        return(num(b.created_at)||0)-(num(a.created_at)||0);
      })
      .slice(0,8)
  ,[manutencoes]);

  return h('div',{class:'p-5 space-y-5'},
    // KPIs
    h('div',{class:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      h(KPI,{label:'Frota Total',value:caminhoes.length,sub:caminhoes.filter(c=>c.status==='Ativo').length+' ativos',color:'blue',icon:'truck'}),
      h(KPI,{label:'Em Manutenção',value:caminhoes.filter(c=>c.status==='Manutenção').length,sub:'parados',color:'orange',icon:'wrench'}),
      h(KPI,{label:'Alertas Críticos',value:crits,sub:'requer ação',color:'red',icon:'bell'}),
      h(KPI,{label:'Custo Total',value:R(totalCusto),sub:'manutenções',color:'purple',icon:'chart'})
    ),
    alertasTacografo.length>0?h(AlertasTacografoWidget,{alertas:alertasTacografo}):null,
    alertasOleo.length>0?h(AlertasOleoWidget,{alertas:alertasOleo,onEnviarWA:enviarAlertaWhatsApp}):null,
    // Gráficos
    h('div',{class:'grid grid-cols-1 lg:grid-cols-2 gap-5'},
      h('div',{class:'card'},
        h('h3',{class:'text-sm font-bold mb-4',style:'color:#071A35'},'Custos Mensais (6 meses)'),
        h(BarChart,{id:'d-month',labels:monthData.map(m=>m.lbl),data:monthData.map(m=>m.val)})
      ),
      h('div',{class:'card'},
        h('h3',{class:'text-sm font-bold mb-4',style:'color:#071A35'},'Top Veículos por Custo'),
        custoPorCam.length>0
          ?h('div',{class:'space-y-3'},custoPorCam.map(t=>{
              const pct=totalCusto>0?Math.round(t.v/totalCusto*100):0;
              return h('div',{key:t.pl},
                h('div',{class:'flex justify-between text-xs mb-1'},h('span',{class:'font-semibold',style:'color:#071A35'},t.pl),h('span',{class:'text-slate-400'},R(t.v))),
                h('div',{class:'pbar'},h('div',{class:'pfill bg-blue-500',style:'width:'+pct+'%'}))
              );
            }))
          :h(Empty,{msg:'Sem dados de custo',icon:'chart'})
      )
    ),
    // Alertas críticos
    crits>0 ? h('div',{class:'card'},
      h('div',{class:'flex items-center justify-between mb-3'},
        h('h3',{class:'text-sm font-bold',style:'color:#071A35'},'⚠️ Alertas Críticos'),
        h('button',{class:'text-xs font-semibold text-blue-600 hover:underline',onClick:()=>goTo('alertas')},'Ver todos →')
      ),
      h('div',{class:'space-y-2'},
        alertas.filter(a=>a.lvl==='critical').slice(0,5).map((a,i)=>
          h('div',{key:i,class:'flex gap-3 p-3 rounded-xl',style:'background:#fef2f2;border:1px solid #fecaca'},
            h('span',null,'🔴'),
            h('div',null,
              h('div',{class:'text-xs font-semibold',style:'color:#dc2626'},a.msg),
              h('div',{class:'text-xs text-red-400'},a.cat+' · '+a.pl)
            )
          )
        )
      )
    ) : null,
    // ── ÚLTIMAS MANUTENÇÕES ────────────────────────────────────────
    h('div',{class:'card'},
      h('div',{class:'flex items-center justify-between mb-4'},
        h('div',{class:'flex items-center gap-2'},
          h('span',{class:'text-lg'},'🔧'),
          h('h3',{class:'text-sm font-bold',style:'color:#071A35'},'Últimas Manutenções')
        ),
        h('button',{class:'text-xs font-semibold text-blue-600 hover:underline',onClick:()=>goTo('maint')},'Ver todas →')
      ),
      ultimasManut.length>0
        ? h('div',{class:'tbl-wrap'},
            h('table',null,
              h('thead',null,
                h('tr',null,
                  ['Placa','Serviço','Oficina','Valor','KM','Data','Status'].map(l=>
                    h('th',{key:l},l)
                  )
                )
              ),
              h('tbody',null,
                ultimasManut.map(m=>
                  h('tr',{key:m.id},
                    h('td',null,h('span',{class:'font-mono font-bold text-xs px-2 py-0.5 rounded',style:'background:#eff6ff;color:#071A35'},m.placa||'—')),
                    h('td',null,h('span',{class:'font-semibold text-xs',style:'color:#1e293b'},m.tipo_servico||'—')),
                    h('td',null,h('span',{class:'text-xs text-slate-500'},m.oficina||'—')),
                    h('td',null,h('span',{class:'font-semibold text-xs',style:'color:#16a34a'},R(custoManutencao(m)))),
                    h('td',null,h('span',{class:'text-xs text-slate-500'},N(m.km)+' km')),
                    h('td',null,h('span',{class:'text-xs text-slate-500'},D(m.data_servico))),
                    h('td',null,h(Bdg,{v:m.status||'concluido'}))
                  )
                )
              )
            )
          )
        : h(Empty,{msg:'Nenhuma manutenção registrada',icon:'wrench'})
    ),
    // Dashboard Óleo
    h(OleoDashboard,{caminhoes,manutencoes,onKmSync:onOk}),
    // Últimos Checklists
    (function(){
      const chksVal=filterChecklistsValidos(checklists,caminhoes);
      return chksVal.length>0 ? h('div',{class:'card'},
        h('div',{class:'flex items-center justify-between mb-3'},
          h('h3',{class:'text-sm font-bold',style:'color:#071A35'},'Últimos Checklists'),
          h('button',{class:'text-xs font-semibold text-blue-600 hover:underline',onClick:()=>goTo('checklist')},'Ver todos →')
        ),
        h('div',{class:'tbl-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,['Placa','Motorista','KM','Resumo','Status','Data'].map(l=>h('th',{key:l},l)))),
            h('tbody',null,chksVal.slice(0,5).map(c=>h('tr',{key:c.id},
              h('td',null,h('span',{class:'font-mono font-bold text-sm',style:'color:#071A35'},c.placa||'—')),
              h('td',null,motoristaChecklist(c,caminhoes)),
              h('td',null,c.km_atual?N(c.km_atual):'—'),
              h('td',null,h('span',{class:'text-xs font-semibold'},checklistResumoColuna(c))),
              h('td',null,h(Bdg,{v:c.status_geral||'ok'})),
              h('td',null,D(c.data_checklist||c.created_at))
            )))
          )
        )
      ) : null;
    })()
  );
}

// PAGE — FROTA
// ═══════════════════════════════════════
function PageFrota({caminhoes,onOk}){
  const[modal,setModal]=useState(false);
  const[importModal,setImportModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[q,setQ]=useState('');
  const[sf,setSf]=useState('');

  const list=useMemo(()=>{
    let r=[...caminhoes];
    if(q)r=r.filter(c=>(c.placa+c.modelo+c.motorista).toLowerCase().includes(q.toLowerCase()));
    if(sf)r=r.filter(c=>c.status===sf);
    return r;
  },[caminhoes,q,sf]);

  const del=c=>askConfirm('Excluir Caminhão','Excluir '+c.placa+'? Esta ação não pode ser desfeita.',async()=>{
    try{await api.del('caminhoes',c.id);toast('Excluído');onOk();}catch(e){toast(e.message,'err');}
  });

  return h('div',{class:'p-5'},
    h('div',{class:'flex flex-wrap gap-3 mb-5'},
      h('div',{class:'relative flex-1 min-w-48'},
        h('span',{class:'absolute left-3 top-1/2 -translate-y-1/2 text-slate-300'},h(Ic,{n:'search',s:15})),
        h('input',{class:'inp pl-9',placeholder:'Buscar placa, modelo, motorista…',value:q,onInput:e=>setQ(e.target.value)})
      ),
      h('select',{class:'inp w-auto',value:sf,onChange:e=>setSf(e.target.value)},
        h('option',{value:''},'Todos os status'),
        STATUS_CAM.map(v=>h('option',{key:v,value:v},v))
      ),
      h('button',{class:'btn btn-outline',onClick:()=>setImportModal(true)},h('span',null,'📊'),' Importar Excel'),
      h('button',{class:'btn btn-primary',onClick:()=>{setEditing(null);setModal(true);}},h(Ic,{n:'plus',s:15}),'Novo Caminhão')
    ),
    list.length>0
      ?h('div',{class:'tbl-wrap'},
          h('table',null,
            h('thead',null,h('tr',null,['Placa','Tipo','Modelo','Ano','KM Atual','Motorista','Status',''].map(l=>h('th',{key:l},l)))),
            h('tbody',null,list.map(c=>h('tr',{key:c.id},
              h('td',null,h('span',{class:'font-mono font-bold text-sm px-2 py-0.5 rounded',style:'color:#071A35;background:#eff6ff'},c.placa||'—')),
              h('td',null,h('span',{class:'badge b-blue'},c.tipo||'—')),
              h('td',null,h('div',null,h('div',{class:'font-medium'},c.modelo||'—'),h('div',{class:'text-xs text-slate-400'},c.marca||''))),
              h('td',null,c.ano||'—'),
              h('td',null,c.km_atual?N(c.km_atual)+' km':'—'),
              h('td',null,c.motorista||'—'),
              h('td',null,h(Bdg,{v:c.status||'Ativo'})),
              h('td',null,h('div',{class:'flex gap-1'},
                h('button',{class:'btn btn-sm btn-outline',onClick:()=>{setEditing(c);setModal(true);}},h(Ic,{n:'edit',s:13})),
                h('button',{class:'btn btn-sm btn-danger',onClick:()=>del(c)},h(Ic,{n:'trash',s:13}))
              ))
            )))
          )
        )
      :h(Empty,{msg:'Nenhum caminhão cadastrado. Importe uma planilha Excel ou cadastre manualmente.',icon:'truck',onAdd:()=>setImportModal(true),addLabel:'Importar Excel'}),
    modal?h(ModalCaminhao,{onClose:()=>setModal(false),onSaved:onOk,editing}):null,
    importModal?h(ModalImportFrota,{onClose:()=>setImportModal(false),onSaved:onOk,caminhoes}):null
  );
}

function PageMaint({manutencoes,caminhoes,onOk}){
  const[modal,setModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[sf,setSf]=useState('');

  const total=manutencoes.reduce((s,m)=>s+custoManutencao(m),0);
  const list=useMemo(()=>
    [...manutencoes]
      .sort((a,b)=>new Date(b.data_servico||0)-new Date(a.data_servico||0))
      .filter(m=>!sf||m.status===sf),
    [manutencoes,sf]
  );
  const del=m=>askConfirm('Excluir Manutenção','Confirmar exclusão?',async()=>{
    try{await api.del('manutencoes',m.id);toast('Excluído');onOk();}catch(e){toast(e.message,'err');}
  });

  return h('div',{class:'p-5'},
    h('div',{class:'grid grid-cols-3 gap-4 mb-5'},
      h(KPI,{label:'Total',value:manutencoes.length,color:'blue',icon:'wrench'}),
      h(KPI,{label:'Pendentes',value:manutencoes.filter(m=>m.status==='pendente').length,color:'orange',icon:'bell'}),
      h(KPI,{label:'Custo Total',value:R(total),color:'purple',icon:'chart'})
    ),
    h('div',{class:'flex flex-wrap gap-3 mb-4'},
      h('select',{class:'inp w-auto',value:sf,onChange:e=>setSf(e.target.value)},
        h('option',{value:''},'Todos os status'),
        ['pendente','em andamento','concluída'].map(v=>h('option',{key:v,value:v},v))
      ),
      h('button',{class:'btn btn-primary ml-auto',onClick:()=>{setEditing(null);setModal(true);}},h(Ic,{n:'plus',s:15}),'Nova Manutenção')
    ),
